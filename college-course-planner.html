// ─── Main render ──────────────────────────────────────────────────────────────
function render(){
  // Capture modal scroll position so things like the GPA grade picker don't
  // jump the user back to the top every time they pick a grade.
  const prevModalScroll=document.querySelector('.mbody')?.scrollTop||0;
  const act=getAct();
  const sems=getAS();
  const all=sems.flatMap(s=>s.courses);
  const reqAll=all.filter(isRequired);
  const addAll=all.filter(c=>!isRequired(c));
  const sumCr=arr=>arr.reduce((t,c)=>t+Number(c.credits||0),0);
  const reqTotalCr=sumCr(reqAll),reqDoneCr=sumCr(reqAll.filter(c=>c.done));
  const addTotalCr=sumCr(addAll),addDoneCr=sumCr(addAll.filter(c=>c.done));
  const total=all.length,done=all.filter(c=>c.done).length;
  const pct=reqTotalCr?Math.round(reqDoneCr/reqTotalCr*100):(total?Math.round(done/total*100):0);
  const addPct=addTotalCr?Math.round(addDoneCr/addTotalCr*100):0;

  if(pct===100&&S.lastPct<100)setTimeout(fireConfetti,50);
  S.lastPct=pct;

  const fbtns=`<button class="fbtn${!S.filter?' on':''}" data-a="filter" data-cat="">All</button>`+
    Object.entries(CATS).map(([k,v])=>{
      const on=S.filter===k;
      return `<button class="fbtn${on?' on':''}" data-a="filter" data-cat="${k}" style="${on?`background:${v.txt};color:${v.bg};border-color:${v.txt}`:`border-color:${v.txt};color:${v.txt}`}">${v.name}</button>`;
    }).join('');

  const prog=trackProgress();
  const bizProg=businessProgress();
  const trackPill=act?`<div class="track-pill" onclick="S.modal='track';render()" title="${act.kind==='business'?'Business major track':'ECE Technical Component'}">
      🎯 ${act.kind==='business'
        ?`${esc(bizProg?.label||'Undeclared Business')} <span style="opacity:.7">${bizProg?.done||0}/${bizProg?.total||0}</span>`
        :prog?`${esc(prog.track.short)} <span style="opacity:.7">${prog.coreHit}/${prog.coreTotal}c · ${prog.electHit}/${prog.need}e</span>`:'Pick a track'}
    </div>`:'';

  document.getElementById('root').innerHTML=`
    ${S.startNote?rStartNote():''}
    ${rModal()}
    ${rBanners()}
    ${S.tabConflict?`<div class="tab-warn">⚠ Another tab has this planner open. Whichever tab saves last wins. <button onclick="S.tabConflict=false;render()">Got it</button></div>`:''}
    <div class="hdr">
      <div class="hdr-top">
        <div>
          <div class="hdr-sub">UT Austin · ${act?.kind==='business'?'McCombs BBA':act?.kind==='general'?'ECE Honors / General':'ECE + Business Honors'}</div>
          <h1>College Course Planner <span style="font-size:11px;opacity:.5;font-weight:400">2024–2026</span></h1>
          <div style="margin-top:4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            <div class="sched-pill" onclick="S.modal='schedules';render()">
              <div class="sched-dot" style="background:${act?.color||'#FFF'}"></div>
              <span style="font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(act?.name||'')}</span>
              <span style="opacity:.7;font-size:10px">▾</span>
            </div>
            ${trackPill}
            ${S.schedules.length>1?`<span style="font-size:10px;opacity:.6">${S.schedules.length} schedules</span>`:''}
            <span id="saved-stamp" class="saved-stamp" title="Autosaved to this browser">${S.lastSaved?'saved '+esc(relTime(S.lastSaved)):''}</span>
          </div>
        </div>
        <div class="hdr-right">
          <div class="stats">
            <div class="stat" title="Credits earned out of credits required for the degree"><div class="v">${reqDoneCr}/${reqTotalCr}</div><div class="l">Degree cr</div></div>
            ${addAll.length?`<div class="stat" title="Additional courses you've added beyond the degree requirements"><div class="v">${addDoneCr}/${addTotalCr}</div><div class="l">Extra cr</div></div>`:''}
            <div class="stat"><div class="v">${pct}%</div><div class="l">Progress</div></div>
          </div>
          <div class="hdr-btns">
            <button class="hbtn" onclick="S.modal='schedules';render()" title="Saved schedules (L)">📋 Schedules</button>
            <button class="hbtn" onclick="S.cmpPickId=null;S.modal='compare-pick';render()" title="Compare (C)">⇄ Compare</button>
            <button class="hbtn" onclick="S.modal='gpa';render()" title="GPA calculator (G)">📊 GPA</button>
            <button class="hbtn" onclick="S.modal='track';render()" title="Track (T)">🎯 Track</button>
            <button class="hbtn" onclick="S.modal='search';render()" title="Search (S)">🔎 Search</button>
            <button class="hbtn" onclick="S.modal='history';render()" title="Version history (H)">🕒 History</button>
            <button class="hbtn" onclick="window.print()" title="Print or save as PDF (P)">🖨️ Print</button>
            <button class="hbtn" onclick="S.modal='transcript';render()" title="Paste UT Direct transcript to auto-fill grades">📝 Transcript</button>
            <button class="hbtn" onclick="S.modal='curriculum';render()" title="Swap curriculum template">📚 Curriculum</button>
            <button class="hbtn" onclick="S.modal='backup';render()" title="Download or restore backup file">💾 Backup</button>
            <button class="hbtn" onclick="S.modalTab='code';S.modal='export';render()" title="Share">📤 Share</button>
            <button class="hbtn" onclick="S.modal='import';render()" title="Import">📥 Import</button>
            <button class="hbtn" onclick="checkForUpdates(true)" title="Check for updates">Update</button>
            <button class="hbtn ghost" onclick="undo()" title="Undo (Ctrl+Z)" ${HISTORY.past.length?'':'disabled'}>↶</button>
            <button class="hbtn ghost" onclick="redo()" title="Redo (Ctrl+Shift+Z)" ${HISTORY.future.length?'':'disabled'}>↷</button>
            <button class="hbtn ghost" onclick="S.modal='kbhelp';render()" title="Keyboard shortcuts">?</button>
            <button class="hbtn ghost" onclick="S.modal='reset';render()" title="Reset">↺</button>
          </div>
        </div>
      </div>
      <div class="pbar" title="Degree completion: ${reqDoneCr} of ${reqTotalCr} required credits"><div class="pfill" style="width:${pct}%"></div></div>
      ${addAll.length?`<div class="pbar pbar-extra" title="Additional courses: ${addDoneCr} of ${addTotalCr} extra credits"><div class="pfill" style="width:${addPct}%;background:var(--gold);opacity:.6"></div></div>`:''}
    </div>
    ${rSelToolbar()}
    <nav class="nav">
      <span class="nav-lbl">Filter:</span>${fbtns}
      <div class="nav-right">${S.compareMode?'':`<button class="nsm p" data-a="show-add-sem">+ Add Semester</button>`}</div>
    </nav>
    ${S.compareMode?rCompareView():`${rEP()}${rMain()}`}`;

  if(S.renamingId&&S.modal==='schedules')setTimeout(()=>{const el=document.getElementById('ren-inp');if(el){el.focus();el.select();}},50);
  if(S.modal==='search')setTimeout(()=>{const i=document.getElementById('search-inp');if(i&&document.activeElement!==i)i.focus();},0);
  // Restore modal scroll so picking a grade in a long GPA list doesn't jump
  // the user back to the top of the modal.
  if(S.modal&&prevModalScroll){const mb=document.querySelector('.mbody');if(mb)mb.scrollTop=prevModalScroll;}
}

// ─── Event delegation ─────────────────────────────────────────────────────────
function mutate(fn,opts){
  pushHistory();
  fn();
  const last=loadSnapshots()[0];
  if(!last||Date.now()-last.ts>60000)saveSnapshotNow(opts?.reason||'auto');
  save();render();
}

document.addEventListener('click',e=>{
  if(e.target.id==='mbk'){S.modal=null;S.modalTab=null;S.renamingId=null;render();return;}
  const el=e.target.closest('[data-a]');if(!el)return;
  const a=el.dataset.a,sem=el.dataset.sem,cid=el.dataset.cid;
  if(a==='filter')mutate(()=>S.filter=el.dataset.cat||null);
  else if(a==='hide-start-note'){
    const cb=document.getElementById('start-suppress');
    if(!cb||cb.checked)markStartSeen();
    S.startNote=false;render();
  }
  else if(a==='manual-update'){checkForUpdates(!S.startNote);}
  else if(a==='open-update-modal'){S.modal='update';render();}
  else if(a==='apply-update'){applyUpdate();}
  else if(a==='dismiss-update'){
    if(S.update?.latest){try{localStorage.setItem(UPDATE_DISMISS_KEY,S.update.latest);}catch(e){}}
    S.updateDismissed=true;render();
  }
  else if(a==='snooze-export'){
    writeExportSnooze(Date.now()+EXPORT_SNOOZE_DAYS*86400000);
    recomputeExportReminder();render();
  }
  else if(a==='open-backup'){S.modal='backup';render();}
  else if(a==='toggle'){e.stopPropagation();mutate(()=>setAS(getAS().map(s=>s.id!==sem?s:{...s,courses:s.courses.map(c=>c.id!==cid?c:{...c,done:!c.done})})));} 
  else if(a==='edit'){
    e.stopPropagation();
    const sems=getAS();const s=sems.find(x=>x.id===sem);const c=s?.courses.find(x=>x.id===cid);
    if(c){S.edit={semId:sem,courseId:cid,isNew:false};S.form={...c,semId:sem};render();window.scrollTo(0,0);}
  }
  else if(a==='add'){S.edit={semId:sem,isNew:true};S.form={id:uid(),code:'',name:'',cat:getAct()?.kind==='business'?'BUSINESS':'ECE',credits:3,done:false,note:'',grade:'',semId:sem};render();window.scrollTo(0,0);}
  else if(a==='cancel'){S.edit=null;S.form={};render();}
  else if(a==='save'){
    const code=document.getElementById('f-code').value.trim();
    const name=document.getElementById('f-name').value.trim();
    if(!code||!name)return;
    const credits=hasCourseNumber(code)?parseCreditsFromCode(code):Math.max(0,parseInt(document.getElementById('f-credits').value)||0);
    const cat=document.getElementById('f-cat').value;
    const toSem=document.getElementById('f-sem').value;
    const note=document.getElementById('f-note').value.trim();
    const grade=document.getElementById('f-grade').value;
    const updated={id:S.form.id,code,name,credits,cat,done:S.form.done||false,note,grade};
    mutate(()=>{
      let sems=getAS();const from=S.edit.semId;
      if(S.edit.isNew){sems=sems.map(s=>s.id!==toSem?s:{...s,courses:[...s.courses,updated]});}
      else if(from===toSem){sems=sems.map(s=>s.id!==from?s:{...s,courses:s.courses.map(c=>c.id!==updated.id?c:updated)});}
      else{sems=sems.map(s=>{if(s.id===from)return{...s,courses:s.courses.filter(c=>c.id!==updated.id)};if(s.id===toSem)return{...s,courses:[...s.courses,updated]};return s;});}
      setAS(sems);S.edit=null;S.form={};
    });
  }
  else if(a==='del'){const{semId,courseId}=S.edit;mutate(()=>{setAS(getAS().map(s=>s.id!==semId?s:{...s,courses:s.courses.filter(c=>c.id!==courseId)}));S.edit=null;S.form={};});}
  else if(a==='delcourse'){
    e.stopPropagation();
    mutate(()=>{
      setAS(getAS().map(s=>s.id!==sem?s:{...s,courses:s.courses.filter(c=>c.id!==cid)}));
      if(S.edit?.courseId===cid){S.edit=null;S.form={};}
      if(S.selection.has(cid)){S.selection.delete(cid);if(!S.selection.size)S.selectionSem=null;}
    });
  }
  else if(a==='dsem'){mutate(()=>{setAS(getAS().filter(s=>s.id!==sem));if(S.edit?.semId===sem){S.edit=null;S.form={};}});}
  else if(a==='show-add-sem'){S.showAddSem=true;render();}
  else if(a==='addsem'){
    const n=document.getElementById('nsn')?.value.trim();
    if(!n){S.showAddSem=false;render();return;}
    const tpl=SEM_TEMPLATES[S.addSemKind]||SEM_TEMPLATES.normal;
    const newSem={id:'sem_'+Date.now(),label:n,courses:tpl.courses.map(c=>({...c,id:uid(),done:false})),isOff:!!tpl.isOff,offNote:tpl.offNote||''};
    mutate(()=>{setAS([...getAS(),newSem]);S.showAddSem=false;S.addSemKind='normal';});
  }
  else if(a==='cancelsem'){S.showAddSem=false;render();}
  else if(a==='close-modal'){S.modal=null;S.modalTab=null;S.renamingId=null;render();}
});

// ─── Course click (selection) ────────────────────────────────────────────────
window.cClick=(semId,cid,e)=>{
  if(e.target.closest('[data-a]')||e.target.closest('.cacts'))return;
  if(e.shiftKey){
    e.preventDefault();
    if(S.selectionSem&&S.selectionSem!==semId)S.selection.clear();
    S.selectionSem=semId;
    if(S.selection.has(cid))S.selection.delete(cid);else S.selection.add(cid);
    render();
  }else if(S.selectionSem===semId&&S.selection.size===1&&S.selection.has(cid)){
    clearSel();
  }else{
    S.selectionSem=semId;
    S.selection=new Set([cid]);
    render();
  }
};
window.clearSel=()=>{S.selection.clear();S.selectionSem=null;render();};
window.bulkToggle=v=>{const ids=[...S.selection];const sem=S.selectionSem;mutate(()=>{setAS(getAS().map(s=>s.id!==sem?s:{...s,courses:s.courses.map(c=>ids.includes(c.id)?{...c,done:v}:c)}));clearSel();});};
window.bulkDelete=()=>{const ids=[...S.selection];const sem=S.selectionSem;mutate(()=>{setAS(getAS().map(s=>s.id!==sem?s:{...s,courses:s.courses.filter(c=>!ids.includes(c.id))}));clearSel();});};
window.bulkMove=()=>{
  const dest=document.getElementById('bulkdest')?.value;if(!dest)return;
  const ids=[...S.selection];const from=S.selectionSem;
  mutate(()=>{
    let moving=[];
    let sems=getAS().map(s=>{if(s.id===from){moving=s.courses.filter(c=>ids.includes(c.id));return{...s,courses:s.courses.filter(c=>!ids.includes(c.id))};}return s;});
    sems=sems.map(s=>s.id!==dest?s:{...s,courses:[...s.courses,...moving]});
    setAS(sems);clearSel();
  });
};

// ─── Schedule actions ─────────────────────────────────────────────────────────
window.switchSched=id=>mutate(()=>{S.activeId=id;S.compareMode=false;S.edit=null;S.form={};S.modal=null;});
// Clicking anywhere on a schedule row switches to it, except when the click
// lands on one of the action buttons or the rename input.
window.schedRowClick=(id,e)=>{
  if(e.target.closest('button')||e.target.closest('input'))return;
  if(id===S.activeId)return;
  switchSched(id);
};
window.newSched=()=>mutate(()=>{
  const sch=makeSchedule(nextName(),nextColor(),'ecb');
  S.schedules.push(sch);
  S.activeId=sch.id;S.modal=null;S.edit=null;S.form={};
});
window.dupSched=srcId=>mutate(()=>{
  const src=S.schedules.find(s=>s.id===srcId);if(!src)return;
  const id=sid();
  S.schedules.push(normalizeSchedule({id,name:src.name+' (copy)',color:nextColor(),sems:dc(src.sems),createdAt:Date.now(),updatedAt:Date.now(),track:src.track,bizTracks:businessTrackKeys(src),kind:src.kind||'ecb'}));
  S.activeId=id;S.modal=null;
});
window.delSched=id=>{if(S.schedules.length<=1)return;mutate(()=>{S.schedules=S.schedules.filter(s=>s.id!==id);if(S.activeId===id)S.activeId=S.schedules[0].id;if(S.compareId===id){S.compareId=null;S.compareMode=false;}});};
window.startRename=id=>{S.renamingId=id;render();};
window.commitRename=id=>{const val=document.getElementById('ren-inp')?.value.trim();if(val)mutate(()=>{S.schedules=S.schedules.map(s=>s.id!==id?s:{...s,name:val});S.renamingId=null;});else{S.renamingId=null;render();}};
window.startCmp=()=>{if(!S.cmpPickId)return;S.compareId=S.cmpPickId;S.compareMode=true;S.modal=null;S.edit=null;render();};

// ─── GPA / track ──────────────────────────────────────────────────────────────
window.setGrade=(semId,cid,g)=>mutate(()=>{
  setAS(getAS().map(s=>s.id!==semId?s:{...s,courses:s.courses.map(c=>c.id!==cid?c:{...c,grade:g})}));
});
window.updateTarget=()=>{
  const el=document.getElementById('gpa-target-res');if(!el)return;
  const p=gpaPanel();const target=parseFloat(S.gpaTarget);
  const remainCr=p.all.filter(c=>!c.done).reduce((t,c)=>t+c.credits,0);
  if(isNaN(target)){el.innerHTML='<span style="color:var(--text3)">Enter a target to see what GPA your remaining courses need.</span>';return;}
  if(remainCr===0){el.textContent='No remaining graded credits to project against.';return;}
  const needed=(target*(p.overall.hrs+remainCr)-p.overall.pts)/remainCr;
  if(needed<=0)el.textContent=`You are already at or above ${target.toFixed(2)}. Remaining courses can be any grade.`;
  else if(needed>4)el.textContent=`Not reachable. Would need a ${needed.toFixed(2)} GPA across the remaining ${remainCr} credits.`;
  else el.innerHTML=`Need a <b>${needed.toFixed(3)}</b> GPA across the remaining ${remainCr} credits to reach <b>${target.toFixed(2)}</b>.`;
};
let _trackMsgTimer=null;
function flashTrackMsg(msg){
  S.trackMsg=msg;
  if(_trackMsgTimer)clearTimeout(_trackMsgTimer);
  _trackMsgTimer=setTimeout(()=>{S.trackMsg='';render();},2800);
}
window.setTrack=key=>mutate(()=>{
  S.schedules=S.schedules.map(s=>{
    if(s.id!==S.activeId)return s;
    const kind=eceTrackKind(s);
    if(!key)return{...s,track:null,kind,sems:removeTrackManagedCourses(s.sems)};
    return{...s,track:key,kind,sems:applyTrackToSems(s.sems,key,{reset:true})};
  });
});
window.toggleTrackElective=code=>{
  const sch=getAct();
  const tk=sch?.track;
  if(!tk||!TRACKS[tk]||!isApprovedTrackElective(tk,code))return;
  let sems=getAS();
  const need=trackElectiveNeed(sch,tk);
  if(isTrackElectiveOnPlan(sems,code,tk)){
    mutate(()=>{setAS(removeTrackElectiveFromPlan(getAS(),code));S.trackMsg='';});
    return;
  }
  if(scheduleHasCode(sems,code)){
    flashTrackMsg(`${code} is already on your plan as a core or other course.`);
    render();
    return;
  }
  if(countTrackElectives(sems,tk)>=need){
    flashTrackMsg(`Maximum ${need} electives for ${eceTrackKind(sch)==='general'?'General/Honors':'ECB'}. Deselect one first.`);
    render();
    return;
  }
  mutate(()=>{
    const semsNow=getAS();
    const semId=defaultSemForTrackCourse(semsNow,true);
    if(!semId)return;
    const course=buildTrackCourse(code,trackElectiveName(code),'elective');
    setAS(semsNow.map(s=>s.id!==semId?s:{...s,courses:[...s.courses,course]}));
    S.trackMsg='';
  });
};

// ─── Catalog autocomplete ────────────────────────────────────────────────────
// Lightweight popup wired to the edit panel "Code" input. Ranked match:
// exact code > code prefix > word prefix in name > substring.
function rankCatalog(q){
  q=q.trim().toUpperCase();if(!q)return[];
  const out=[];
  for(const e of CATALOG){
    const code=e.code.toUpperCase(),name=e.name.toUpperCase();
    let score=0;
    if(code===q)score=10;
    else if(code.startsWith(q))score=7;
    else if(code.replace(/\s+/g,'').startsWith(q.replace(/\s+/g,'')))score=6;
    else if(name.startsWith(q))score=4;
    else if(code.includes(q))score=3;
    else if(name.includes(q))score=2;
    if(score)out.push({e,score});
  }
  out.sort((a,b)=>b.score-a.score||a.e.code.localeCompare(b.e.code));
  return out.slice(0,8).map(x=>x.e);
}

// ─── UT Direct transcript import ─────────────────────────────────────────────
// Permissive parser: scan lines for a course code + a grade. Updates matching
// courses in the active plan (sets done=true and grade). Lines that look like
// real courses but don't match anything in the plan get reported back so the
// user can add them.
function parseTranscript(text){
  // UT Academic Summary PDFs split most table rows across multiple lines:
  //   M 408C
  //   DIFFEREN AND INTEGRAL
  //   CALCULUS CR 26050
  //   Credit by
  //   exam 4.0 0.00
  // and even rows that fit on one printed line still have the 'Type' wrap below.
  // Strategy: a row starts when a line BEGINS with a course code. Continuation
  // lines (no leading code) get appended until the next code-starting line.
  // Grade is searched in the joined chunk, after the code, with +/- preserved.
  const lines=text.split(/[\r\n]+/).map(l=>l.replace(/\s+/g,' ').trim()).filter(l=>l);
  // Code at line start = real course row. Dept = 1-4 letters, optional second
  // word of 1-3 letters ('B A', 'A S'); number = optional 1-letter prefix
  // ('S' in 'S353'), 3 digits, optional 1-letter suffix.
  const lineCodeRe=/^([A-Z]{1,4}(?:\s+[A-Z]{1,3})?)\s+([A-Z]?)(\d{3})([A-Z]?)\b/;
  // Grades incl. CR/NC, W/Q/IP, and Z (in-progress) — Z maps to IP for GPA.
  // (?=\W|$) lookahead so 'A-' / 'B+' (whose suffix is non-word) match before a space.
  const gradeRe=/\b(A\+|A-|B\+|B-|C\+|C-|D\+|D-|A|B|C|D|F|CR|NC|W|Q|IP|Z)(?=\W|$)/;
  // Page/header lines that fall between row continuation lines — skip without
  // breaking the current row, since the PDF inserts them mid-row.
  const skipRe=/^(Academic Summary|Course\s+Title|Page \d|Total Hours|(Fall|Spring|Summer|Winter) \d{4} Courses?|(Lower|Upper) Division|Graduate Level|Overall|GPA|Grade Points|Hours:|Major \d|School \d|EID:|Name:|Classification:|Date Degree|First Semester|Last Semester)/i;
  const out=[];
  for(let i=0;i<lines.length;i++){
    const m=lines[i].match(lineCodeRe);
    if(!m)continue;
    const dept=m[1].replace(/\s+/g,' ').trim();
    const num=(m[2]||'')+m[3]+(m[4]||'');
    const code=`${dept} ${num}`;
    // Walk forward collecting continuation lines until we hit the next row-starting code.
    let chunk=lines[i].slice(m[0].length);
    let j=i+1;
    while(j<lines.length){
      const next=lines[j];
      if(lineCodeRe.test(next))break;
      if(skipRe.test(next)){j++;continue;}
      chunk+=' '+next;j++;
    }
    const mg=chunk.match(gradeRe);
    if(!mg)continue;
    let grade=mg[1];
    if(grade==='Z')grade='IP';
    // Try to pull credit hours from the chunk: UT rows end with '<credits> <grade points>'
    // like '3.0 6.99' or '1.0 0.00'. Search after the grade so we don't grab a unique ID.
    let credits=null;
    const afterGrade=chunk.slice(chunk.indexOf(mg[0])+mg[0].length);
    const mcr=afterGrade.match(/\b(\d+(?:\.\d+)?)\s+\d+\.\d{1,2}\b/);
    if(mcr)credits=parseFloat(mcr[1]);
    out.push({code,grade,credits,raw:(lines[i]+(chunk.trim()?' '+chunk.trim():'')).trim()});
  }
  return out;
}
// UT department → planner category, for auto-adding extra transcript courses.
// Lists below cover the most common UT depts a student sees on a transcript;
// anything not listed defaults to OTHER.
const DEPT_CAT={
  // Math + Statistics
  M:'MATH',STA:'MATH',
  // ECE
  ECE:'ECE',
  // Sciences (lab + lecture)
  PHY:'PHY',CH:'PHY',BIO:'PHY',AST:'PHY',GEO:'PHY',CHE:'PHY',
  // Business (McCombs)
  BA:'BUSINESS','B A':'BUSINESS',MAN:'BUSINESS',MKT:'BUSINESS',ACC:'BUSINESS',
  FIN:'BUSINESS',MIS:'BUSINESS',OM:'BUSINESS','O M':'BUSINESS',DS:'BUSINESS',
  'D S':'BUSINESS',LEB:'BUSINESS',BAX:'BUSINESS',IB:'BUSINESS','I B':'BUSINESS',
  ECO:'BUSINESS',BGS:'BUSINESS',
  // Core: humanities, history, gov, social/behavioral sciences, signature courses
  HIS:'CORE',GOV:'CORE',RHE:'CORE',E:'CORE',UGS:'CORE',
  PSY:'CORE',ANT:'CORE',SOC:'CORE',EDP:'CORE',GRG:'CORE',
  HDF:'CORE',LIN:'CORE',SW:'CORE',WGS:'CORE','A S':'CORE',ARC:'CORE',
  ARH:'CORE',ART:'CORE',MUS:'CORE','T D':'CORE',
  // Languages
  SPN:'OTHER',FR:'OTHER',GER:'OTHER',CHI:'OTHER',JPN:'OTHER',ITL:'OTHER',
};
function guessCategory(code){
  const norm=String(code||'').toUpperCase().replace(/\s+/g,'');
  const noSpace=norm.match(/^([A-Z]+)/)?.[1]||'';
  if(DEPT_CAT[noSpace])return DEPT_CAT[noSpace];
  // Try with internal space preserved (e.g. 'B A', 'O M', 'A S').
  const withSpace=String(code||'').toUpperCase().match(/^([A-Z]+(?:\s+[A-Z]+)?)/)?.[1]?.replace(/\s+/g,' ').trim()||'';
  if(DEPT_CAT[withSpace])return DEPT_CAT[withSpace];
  return 'OTHER';
}

function applyTranscript(parsed){
  // Aggressive normalization: uppercase, strip ALL whitespace, drop trailing H.
  //   'B A 324H' → 'BA324', 'BA 324H' → 'BA324', 'HIS 315K' → 'HIS315K', 'M 408C' → 'M408C'
  const normTight=s=>String(s||'').toUpperCase().replace(/\s+/g,'').replace(/H$/,'');
  // Dept prefix (letters before any digit), e.g. 'B A 324H' → 'BA', 'HIS' → 'HIS'.
  const deptOf=s=>{
    const m=String(s||'').toUpperCase().replace(/\s+/g,'').match(/^([A-Z]+)/);
    return m?m[1]:'';
  };
  // Pure placeholders (no digits) like 'HIS' or 'ANT/EDP/PSY/SOC' can match any
  // transcript course whose dept appears in the slash-list.
  const isPlaceholder=s=>!/\d/.test(String(s||''));
  const altsOf=s=>String(s||'').toUpperCase().split(/[\/,]/).map(part=>{
    const m=part.replace(/\s+/g,'').match(/^([A-Z]+)/);return m?m[1]:'';
  }).filter(Boolean);

  // Walk transcript entries once; for each, try to find an unfilled planner
  // slot using progressively looser criteria. Iteration order: transcript order
  // (semester chronological) → planner order (sem layout).
  const updates=parsed.map(p=>({
    norm:normTight(p.code),dept:deptOf(p.code),code:p.code,grade:p.grade,credits:p.credits,used:false,
  }));

  let matched=0,added=0;
  mutate(()=>{
    // Pass 1: walk planner sems and fill matching slots.
    const filled=getAS().map(sem=>{
      if(sem.isOff)return sem;
      return{...sem,courses:sem.courses.map(c=>{
        const cn=normTight(c.code);
        const cd=deptOf(c.code);
        // (1) Exact normalized code match: handles 'BA 324H' ↔ 'B A 324H',
        //     'ECE 302H' ↔ 'ECE 302H', etc. Whitespace and trailing H ignored.
        let upd=updates.find(u=>!u.used&&u.norm===cn);
        // (2) Number-prefix: planner 'E 316' matches transcript 'E 316P' (and
        //     any 'E 316X' variant). Requires planner code to be more specific
        //     than just a dept (cn.length must exceed dept length).
        if(!upd&&cn.length>cd.length)upd=updates.find(u=>!u.used&&u.norm.startsWith(cn));
        // (3) Dept-only placeholder: planner 'HIS' / 'ANT/EDP/PSY/SOC' fills
        //     with the first transcript course whose dept is in the alts list.
        if(!upd&&isPlaceholder(c.code)){
          const alts=altsOf(c.code);
          upd=updates.find(u=>!u.used&&alts.includes(u.dept));
        }
        if(upd){
          upd.used=true;matched++;
          const newCode=cn!==upd.norm?upd.code:c.code;
          return{...c,done:true,grade:upd.grade,code:newCode};
        }
        return c;
      })};
    });

    // Pass 2: dedupe — any transcript course whose code already exists somewhere
    // in the (just-filled) plan was implicitly matched and shouldn't be added again.
    const existingCodes=new Set(filled.flatMap(s=>s.courses).map(c=>normTight(c.code)));
    const leftover=updates.filter(u=>!u.used&&!existingCodes.has(u.norm));

    // Pass 3: bucket leftovers into an 'Imported credits' semester so they
    // count toward the user's total and show up in the Extra-credit bar.
    if(leftover.length){
      const newCourses=leftover.map(u=>({
        id:uid(),code:u.code,name:u.code,cat:guessCategory(u.code),
        credits:Number.isFinite(u.credits)?u.credits:3, // 0 is valid (UGS, A S 000C, etc.)
        done:true,grade:u.grade,note:'Imported from transcript',
      }));
      added=newCourses.length;
      const idx=filled.findIndex(s=>s.id==='imports');
      let withImports;
      if(idx>=0){
        withImports=filled.map(s=>s.id==='imports'?{...s,courses:[...s.courses,...newCourses]}:s);
      }else{
        withImports=[...filled,{id:'imports',label:'Imported transcript credits',courses:newCourses}];
      }
      setAS(withImports);
    }else{
      setAS(filled);
    }
  },{reason:'transcript-import'});

  return{matched,added,total:parsed.length,
    unmatched:updates.filter(u=>!u.used).map(u=>({code:u.code,grade:u.grade}))};
}
window.pasteTranscriptFromClipboard=async()=>{
  const ta=document.getElementById('transcript-in');if(!ta)return;
  try{
    const text=await navigator.clipboard.readText();
    if(!text){alert('Clipboard is empty.');return;}
    ta.value=text;ta.focus();
  }catch(err){
    alert('Could not read clipboard. Paste manually with Ctrl+V (Cmd+V on Mac).');
  }
};
window.runTranscriptImport=()=>{
  const ta=document.getElementById('transcript-in');if(!ta)return;
  const parsed=parseTranscript(ta.value);
  if(!parsed.length){document.getElementById('transcript-result').innerHTML='<span style="color:#C00">No courses found. Paste the table of completed courses from UT Direct.</span>';return;}
  const r=applyTranscript(parsed);
  let html=`<b>${r.matched}</b> matched to existing slots`;
  if(r.added)html+=`, <b>${r.added}</b> added as extra credit (see "Imported transcript credits" at the bottom of your plan)`;
  html+=`.`;
  if(r.matched===0&&r.added===0&&r.total>0){
    html+=` <span style="color:var(--text3)">All ${r.total} parsed lines were already in your plan with the same code.</span>`;
  }
  document.getElementById('transcript-result').innerHTML=html;
};

// ─── Curriculum templates ────────────────────────────────────────────────────
window.applyCurriculum=key=>{
  const t=CURRICULUM_TEMPLATES[key];if(!t)return;
  if(!confirm(`Replace the active plan with the "${t.short}" template? A snapshot is saved first so you can recover.`))return;
  saveSnapshotNow('pre-curriculum-swap');
  mutate(()=>{
    const id=S.activeId;
    S.schedules=S.schedules.map(s=>s.id!==id?s:normalizeSchedule({...s,sems:t.build(),kind:t.kind||key,track:null,bizTracks:[],updatedAt:Date.now()}));
    S.modal=null;S.edit=null;S.form={};
  },{reason:'curriculum-swap'});
};

// ─── Touch drag (mobile) ─────────────────────────────────────────────────────
// HTML5 drag-and-drop does not fire on touchscreens. Long-press a card to
// start, drag a ghost element, drop on the target semester card.
let touchDrag=null;
document.addEventListener('touchstart',e=>{
  const card=e.target.closest('.cc');if(!card)return;
  const semCard=card.closest('.sc');if(!semCard)return;
  const semId=semCard.id.replace(/^sc-/,'');
  // data-cid is on the chk element. Pull from there.
  const cidEl=card.querySelector('[data-cid]');if(!cidEl)return;
  const cid=cidEl.dataset.cid;
  touchDrag={semId,cid,el:card,started:false,timer:setTimeout(()=>{
    if(!touchDrag)return;
    touchDrag.started=true;
    card.classList.add('touching');
    if(navigator.vibrate)try{navigator.vibrate(15);}catch(_){}
    const sems=getAS();const c=sems.find(s=>s.id===semId)?.courses.find(x=>x.id===cid);
    if(c){
      S.dragSrc={semId,courseId:cid,bulk:false};
      const g=document.createElement('div');g.id='touch-ghost';g.className='touch-ghost';g.textContent=c.code;
      document.body.appendChild(g);
      const t=e.touches[0];g.style.left=t.clientX+'px';g.style.top=t.clientY+'px';
    }
  },380)};
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!touchDrag)return;
  const t=e.touches[0];
  // Cancel long-press if user starts scrolling before timer fires.
  if(!touchDrag.started){const dx=t.clientX-(touchDrag.x0||t.clientX),dy=t.clientY-(touchDrag.y0||t.clientY);if(!touchDrag.x0){touchDrag.x0=t.clientX;touchDrag.y0=t.clientY;}else if(Math.abs(dx)>10||Math.abs(dy)>10){clearTimeout(touchDrag.timer);touchDrag=null;}return;}
  e.preventDefault();
  const g=document.getElementById('touch-ghost');if(g){g.style.left=t.clientX+'px';g.style.top=t.clientY+'px';}
  // Highlight the semester under the touch.
  const under=document.elementFromPoint(t.clientX,t.clientY)?.closest('.sc');
  document.querySelectorAll('.sc.dov').forEach(el=>el.classList.remove('dov'));
  if(under&&under.id&&under.id!=='sc-'+touchDrag.semId)under.classList.add('dov');
  // Page edge auto-scroll.
  const vh=window.innerHeight,Z=80;
  if(t.clientY<Z)window.scrollBy(0,-10);
  else if(t.clientY>vh-Z)window.scrollBy(0,10);
},{passive:false});
document.addEventListener('touchend',e=>{
  if(!touchDrag){return;}
  clearTimeout(touchDrag.timer);
  const g=document.getElementById('touch-ghost');if(g)g.remove();
  touchDrag.el.classList.remove('touching');
  if(touchDrag.started){
    const t=e.changedTouches[0];
    const under=document.elementFromPoint(t.clientX,t.clientY)?.closest('.sc');
    document.querySelectorAll('.sc.dov').forEach(el=>el.classList.remove('dov'));
    if(under&&under.id&&under.id!=='sc-'+touchDrag.semId){
      const target=under.id.replace(/^sc-/,'');
      window.wDrop(target);
    }else{S.dragSrc=null;}
  }
  touchDrag=null;
},{passive:true});

// ─── Custom drag preview ─────────────────────────────────────────────────────
// Replaces the browser's default drag ghost with a small canvas-rendered chip.
window.wDSCustom=(semId,courseId,e)=>{
  // Build preview if dataTransfer is available.
  try{
    if(e&&e.dataTransfer&&e.dataTransfer.setDragImage){
      const sems=getAS();const c=sems.find(s=>s.id===semId)?.courses.find(x=>x.id===courseId);
      const label=c?`${c.code}`:'';
      const N=S.selection.has(courseId)&&S.selectionSem===semId?S.selection.size:1;
      const text=N>1?`${label} +${N-1}`:label;
      const cv=document.createElement('canvas');
      const W=200,H=36;cv.width=W*2;cv.height=H*2;cv.style.width=W+'px';cv.style.height=H+'px';
      const ctx=cv.getContext('2d');ctx.scale(2,2);
      ctx.fillStyle='#BF3A1F';ctx.strokeStyle='#8A2010';
      ctx.beginPath();ctx.roundRect?ctx.roundRect(1,1,W-2,H-2,7):ctx.rect(1,1,W-2,H-2);ctx.fill();ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='600 13px -apple-system,Segoe UI,sans-serif';
      ctx.textBaseline='middle';ctx.fillText(text,12,H/2);
      // Off-screen attach is required for Safari/Chrome to honor the bitmap.
      cv.style.position='absolute';cv.style.left='-9999px';document.body.appendChild(cv);
      e.dataTransfer.setDragImage(cv,20,18);
      setTimeout(()=>cv.remove(),0);
    }
  }catch(_){}
  return window.wDS(semId,courseId);
};

// ─── Targeted search update (no full re-render on keystrokes) ────────────────
function computeSearchResultsHtml(){
  const q=(S.searchQ||'').trim().toLowerCase();
  if(!q)return'<div class="sres-empty">Type a course code or name above.</div>';
  // Ranked: exact code > prefix > code substring > name match.
  const out=[];
  for(const sch of S.schedules)for(const sem of sch.sems)for(const c of sem.courses){
    const code=c.code.toLowerCase(),name=c.name.toLowerCase();
    let score=0;
    if(code===q)score=10;
    else if(code.startsWith(q))score=6;
    else if(code.includes(q))score=4;
    else if(name.startsWith(q))score=3;
    else if(name.includes(q))score=1;
    if(score)out.push({sch,sem,c,score});
  }
  if(!out.length)return'<div class="sres-empty">No matches.</div>';
  out.sort((a,b)=>b.score-a.score);
  return `<div class="sres">${out.slice(0,80).map(r=>`
    <div class="sres-row" onclick="jumpTo('${r.sch.id}','${r.sem.id}','${r.c.id}')">
      <span class="sr-code" style="color:${(CATS[r.c.cat]||CATS.OTHER).txt}">${esc(r.c.code)}</span>
      <span class="sr-name">${esc(r.c.name)}</span>
      <span class="sr-loc">${esc(r.sch.name)} · ${esc(r.sem.label)}</span>
    </div>`).join('')}</div>`;
}
window.onSearchInput=v=>{
  S.searchQ=v;
  // Replace just the results container instead of re-rendering the whole modal.
  const host=document.getElementById('search-results');
  if(host){host.innerHTML=computeSearchResultsHtml();return;}
  render();
};

// ─── Pre-warm common modals at idle ──────────────────────────────────────────
// Forces the browser to parse modal CSS/HTML once during idle so the first
// open feels instant.
function prewarmModals(){
  const host=document.getElementById('prewarm');if(!host)return;
  try{
    const prev=S.modal;
    for(const m of['gpa','search','history','track']){S.modal=m;host.innerHTML=rModal();}
    S.modal=prev;host.innerHTML='';
  }catch(_){}
}

// (existing exposures kept above)

// ─── Init ─────────────────────────────────────────────────────────────────────
(async()=>{
  const ok=await load();
  if(!ok)initDefault();
  S.schedules=S.schedules.map(s=>normalizeSchedule(s));
  if(readStartSeen())S.startNote=false;
  S.lastExportAt=readLastExport();
  if(!S.lastExportAt){writeLastExport(Date.now());}
  S.exportSnoozedUntil=readExportSnooze();
  recomputeExportReminder();
  render();
  await checkForUpdates(false);
  setInterval(()=>{
    const stamp=document.getElementById('saved-stamp');
    if(stamp&&S.lastSaved)stamp.textContent='saved '+relTime(S.lastSaved);
    const prev=S.exportReminder;recomputeExportReminder();
    if(prev!==S.exportReminder)render();
  },30000);
  if('requestIdleCallback'in window)requestIdleCallback(prewarmModals,{timeout:2000});
  else setTimeout(prewarmModals,500);
})();
