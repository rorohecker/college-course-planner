<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Course Planner — UT Austin ECE + Business Honors</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4F0;--surface:#FFFFFF;--surface2:#F2EDE8;--border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --text:#1A1A1A;--text2:#666;--text3:#999;
  --accent:#BF3A1F;--accent-d:#8A2010;--gold:#FFC862;--green:#2A7A47;
  --ece-bg:#FAECE7;--ece-brd:#F5C4B3;--ece-txt:#993C1D;
  --math-bg:#E6F1FB;--math-brd:#B5D4F4;--math-txt:#185FA5;
  --biz-bg:#EEEDFE;--biz-brd:#CECBF6;--biz-txt:#534AB7;
  --core-bg:#FAEEDA;--core-brd:#FAC775;--core-txt:#854F0B;
  --adv-bg:#EAF3DE;--adv-brd:#C0DD97;--adv-txt:#3B6D11;
  --phy-bg:#E1F5EE;--phy-brd:#9FE1CB;--phy-txt:#0F6E56;
  --oth-bg:#F1EFE8;--oth-brd:#D3D1C7;--oth-txt:#5F5E5A;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181614;--surface:#262220;--surface2:#302C2A;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
  --text:#E8E4DF;--text2:#9A9490;--text3:#666;
  --ece-bg:#4A1B0C;--ece-brd:#993C1D;--ece-txt:#F0997B;
  --math-bg:#042C53;--math-brd:#185FA5;--math-txt:#85B7EB;
  --biz-bg:#26215C;--biz-brd:#534AB7;--biz-txt:#AFA9EC;
  --core-bg:#412402;--core-brd:#854F0B;--core-txt:#EF9F27;
  --adv-bg:#173404;--adv-brd:#3B6D11;--adv-txt:#97C459;
  --phy-bg:#04342C;--phy-brd:#0F6E56;--phy-txt:#5DCAA5;
  --oth-bg:#2C2C2A;--oth-brd:#5F5E5A;--oth-txt:#B4B2A9;
}}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--accent);color:#fff;padding:12px 20px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.hdr-sub{font-size:10px;opacity:.75;text-transform:uppercase;letter-spacing:1.2px}
.hdr h1{font-size:17px;font-weight:600;margin:2px 0 4px}
.sched-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);cursor:pointer;font-size:11px;transition:background .1s}
.sched-pill:hover{background:rgba(255,255,255,.25)}
.sched-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.track-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);cursor:pointer;font-size:10px;transition:background .1s}
.track-pill:hover{background:rgba(255,255,255,.25)}
.hdr-right{display:flex;flex-direction:column;gap:7px;align-items:flex-end;flex-shrink:0}
.stats{display:flex;gap:7px}
.stat{background:rgba(0,0,0,.22);border-radius:7px;padding:5px 11px;text-align:center}
.stat .v{font-size:15px;font-weight:600;line-height:1.2}
.stat .l{font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.4px}
.hdr-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.hbtn{padding:3px 9px;border-radius:5px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:11px;transition:background .1s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.28)}
.hbtn.ghost{background:transparent;border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.65)}
.hbtn:disabled{opacity:.4;cursor:not-allowed}
.pbar{height:3px;background:rgba(255,255,255,.25);border-radius:2px;margin-top:10px}
.pbar-extra{margin-top:3px;opacity:.85}
.pfill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.nav-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.fbtn{padding:3px 9px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;transition:all .1s}
.fbtn:hover{background:var(--surface2)}
.fbtn.on{background:var(--text);color:var(--surface);border-color:var(--text)}
.nav-right{margin-left:auto;display:flex;gap:5px}
.nsm{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);white-space:nowrap}
.nsm:hover{background:var(--border)}
.nsm.p{background:var(--accent);color:#fff;border-color:var(--accent)}
.nsm.p:hover{background:var(--accent-d)}
.tab-warn{background:#7A4A00;color:#fff;padding:6px 16px;font-size:11px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.tab-warn button{padding:3px 9px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:10px}
.seltb{background:#1A2A4A;color:#fff;padding:7px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.seltb b{font-size:12px}
.seltb button{padding:3px 9px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:5px;cursor:pointer;font-size:11px}
.seltb button:hover{background:rgba(255,255,255,.28)}
.seltb select{padding:3px 8px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:5px;font-size:11px}
.seltb select option{background:#1A2A4A;color:#fff}
.cmp-bar{background:#1A2A4A;color:#fff;padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:2px solid #2A4A8A}
.cmp-tag{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600}
.cmp-sum{font-size:10px;opacity:.65;margin-left:4px}
.cmp-exit{margin-left:auto;padding:4px 11px;border-radius:5px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;cursor:pointer;font-size:11px}
.cmp-exit:hover{background:rgba(255,255,255,.1)}
.ep{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px}
.ep h3{font-size:13px;font-weight:600;margin-bottom:12px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fg.three{grid-template-columns:1fr 1fr 1fr}
.fld{display:flex;flex-direction:column;gap:3px}
.fld.full{margin-bottom:8px}
.fld label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.fld input,.fld select{padding:6px 9px;border:1px solid var(--border2);border-radius:6px;font-size:12px;background:var(--surface2);color:var(--text);outline:none;width:100%}
.fld input:focus,.fld select:focus{border-color:var(--accent)}
.ea{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.bdel{padding:5px 11px;background:#FEE;color:#C00;border:1px solid #FCC;border-radius:6px;cursor:pointer;font-size:11px}
.bcancel{padding:5px 11px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:11px;background:transparent;color:var(--text2)}
.bsave{padding:5px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600}
.main{padding:14px 20px}
.yr-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin:4px 0 6px}
.sem-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.sem-row.full{grid-template-columns:1fr}
@media(max-width:600px){.sem-row{grid-template-columns:1fr}}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border .12s,background .12s}
.sc.dov{border:2px dashed var(--accent)!important;background:var(--surface2)}
.sc.off{background:repeating-linear-gradient(45deg,var(--surface),var(--surface) 8px,var(--surface2) 8px,var(--surface2) 16px)}
.sh{padding:7px 11px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.sh-l{display:flex;align-items:baseline;gap:6px;min-width:0;flex:1}
.sh-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sh-meta{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.sh-r{display:flex;gap:3px;flex-shrink:0}
.sbtn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;transition:all .1s}
.sbtn:hover{background:var(--border)}
.sbtn.add{background:var(--accent);border-color:var(--accent);color:#fff;font-size:16px}
.sbtn.add:hover{background:var(--accent-d)}
.sprg{height:2px;background:var(--border)}
.sprgf{height:100%;background:var(--green);transition:width .4s}
.cl{padding:7px;display:flex;flex-direction:column;gap:4px;min-height:36px}
.empty{text-align:center;padding:12px;color:var(--text3);font-size:11px;font-style:italic}
.off-note{padding:14px;text-align:center;color:var(--text3);font-size:11px;font-style:italic}
.dl-list{padding:5px 9px;background:var(--surface2);border-top:1px solid var(--border);font-size:10px;color:var(--text2)}
.dl-list b{color:var(--text);font-weight:600}
.cc{display:flex;align-items:flex-start;gap:6px;padding:5px 8px;border-radius:6px;cursor:grab;border:1px solid transparent;transition:transform .1s,box-shadow .1s;user-select:none;position:relative}
.cc:active{cursor:grabbing}
.cc:hover{transform:translateX(2px);box-shadow:0 2px 6px rgba(0,0,0,.1)}
.cc.done{opacity:.5}
.cc.sel{outline:2px solid var(--accent);outline-offset:1px}
.chk{width:15px;height:15px;border-radius:3px;border:1.5px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;margin-top:1px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ci{flex:1;min-width:0}
.ccode{font-size:11px;font-weight:700}
.cname{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-top:1px}
.cnote{font-size:9px;color:var(--text3);font-style:italic;display:block;margin-top:1px}
.cc.done .ccode,.cc.done .cname{text-decoration:line-through}
.crdt{font-size:9px;color:var(--text3);flex-shrink:0;margin-top:2px}
.cgrade{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--surface2);color:var(--text2);margin-top:1px}
.cacts{display:none;gap:2px;flex-shrink:0;align-items:flex-start;margin-top:1px}
.cc:hover .cacts,.cc.sel .cacts{display:flex}
@media(hover:none){.cacts{display:flex}}
.ebtn,.dbtn{width:18px;height:18px;border-radius:3px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:11px;color:var(--text2);align-items:center;justify-content:center;flex-shrink:0;display:flex;line-height:1;padding:0}
.dbtn{border-color:#FCC;color:#C00;background:#FEE;font-size:13px;font-weight:700}
.dbtn:hover{background:#FCC}
.csc{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.csc-hdr{padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.csc-title{font-size:12px;font-weight:600}
.csc-cr{font-size:10px;color:var(--text3)}
.csc-pills{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.dpill{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:500;white-space:nowrap}
.dpill.sh{background:#EAF3DE;color:#3B6D11}
.dpill.oa{background:#FEF3DC;color:#7A4A00}
.dpill.ob{background:#E6F1FB;color:#185FA5}
@media(prefers-color-scheme:dark){
  .dpill.sh{background:#173404;color:#97C459}
  .dpill.oa{background:#3A2200;color:#F0C060}
  .dpill.ob{background:#042C53;color:#85B7EB}
}
.csc-cols{display:grid;grid-template-columns:1fr 1fr}
.csc-col{padding:6px;min-height:36px}
.csc-col-hdr{font-size:10px;font-weight:600;padding:3px 7px;margin-bottom:4px;display:flex;align-items:center;gap:5px;border-radius:4px}
.ccc{display:flex;align-items:flex-start;gap:5px;padding:4px 7px;border-radius:5px;border:1px solid transparent;margin-bottom:3px}
.ccc.oa{background:#FFFBE8;border-color:#F0D080}
.ccc.ob{background:#EEF6FF;border-color:#B0D0F0}
@media(prefers-color-scheme:dark){.ccc.oa{background:#2A1E00;border-color:#6A4800}.ccc.ob{background:#001830;border-color:#184870}}
.ccc-lbl{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0;margin-top:2px}
.ccc-lbl.a{background:#F0D080;color:#5A3800}
.ccc-lbl.b{background:#B0D0F0;color:#083070}
@media(prefers-color-scheme:dark){.ccc-lbl.a{background:#6A4800;color:#F0D080}.ccc-lbl.b{background:#184870;color:#B0D0F0}}
.ccc-info{flex:1;min-width:0}
.ccc-code{font-size:10px;font-weight:700}
.ccc-name{font-size:9px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.ccc-cr{font-size:9px;color:var(--text3);flex-shrink:0;margin-top:2px}
.csc-div{width:1px;background:var(--border)}
.csc-mt{padding:10px;color:var(--text3);font-size:10px;font-style:italic;text-align:center}
.asf{border:1px dashed var(--border2);border-radius:10px;padding:9px 12px;background:var(--surface2);display:flex;gap:7px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.asf input{flex:1;min-width:160px;padding:5px 9px;border:1px solid var(--border2);border-radius:6px;font-size:12px;background:var(--surface);color:var(--text);outline:none}
.asf select{padding:5px 9px;border:1px solid var(--border2);border-radius:6px;font-size:11px;background:var(--surface);color:var(--text);outline:none}
.asf button{padding:5px 11px;font-size:11px;border-radius:6px;cursor:pointer}
.mbk{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--surface);border-radius:14px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;display:flex;flex-direction:column}
.mhdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhdr h3{font-size:15px;font-weight:600}
.mclose{width:26px;height:26px;border-radius:6px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center}
.mbody{padding:16px 20px;overflow-y:auto;flex:1}
.mfooter{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;align-items:center;flex-shrink:0}
.mfooter .left{margin-right:auto;font-size:11px;color:var(--text3)}
.slist{display:flex;flex-direction:column;gap:8px}
.si{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;transition:border-color .1s,background .1s}
.si:not(.act):hover{border-color:var(--accent);background:var(--surface)}
.si.act{border-color:var(--accent);background:var(--surface);cursor:default}
.si-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.si-info{flex:1;min-width:0}
.si-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-name input{width:100%;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text);outline:none;border-bottom:1px solid var(--accent)}
.si-meta{font-size:10px;color:var(--text3);margin-top:2px}
.si-acts{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.sa{padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2)}
.sa:hover{background:var(--border)}
.sa.act-badge{background:var(--accent);color:#fff;border-color:var(--accent);cursor:default}
.sa.d{color:#C00;border-color:#FCC}
.sa.d:hover{background:#FEE}
.cpg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cpi{padding:12px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .1s;text-align:center}
.cpi:hover{border-color:var(--border2)}
.cpi.sel{border-color:var(--accent)}
.cpi-dot{width:12px;height:12px;border-radius:50%;margin:0 auto 6px}
.cpi-name{font-size:12px;font-weight:600}
.cpi-meta{font-size:10px;color:var(--text3);margin-top:3px}
.sta{width:100%;height:90px;padding:9px;border:1px solid var(--border2);border-radius:7px;font-family:monospace;font-size:10px;background:var(--surface2);color:var(--text);resize:vertical;outline:none;margin-bottom:10px}
.copied{font-size:11px;color:var(--green);display:none}
.copied.show{display:block}
.start-title{font-size:16px;font-weight:700;margin-bottom:7px}
.start-copy{font-size:13px;color:var(--text2);line-height:1.45;margin-bottom:10px}
.start-update{font-size:11px;color:var(--text3);padding:8px 10px;border-radius:7px;background:var(--surface2);margin-top:8px}
.start-actions{display:flex;gap:8px;justify-content:flex-end;align-items:center;margin-top:14px;flex-wrap:wrap}
.start-check{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);margin-right:auto;cursor:pointer;user-select:none}
.linkbtn{padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-size:12px;text-decoration:none}
.linkbtn.p{background:var(--accent);border-color:var(--accent);color:#fff}
.linkbtn:hover{background:var(--border)}
.linkbtn.p:hover{background:var(--accent-d)}
.top-banner{background:var(--core-bg);color:var(--core-txt);border-bottom:1px solid var(--core-brd);padding:7px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px}
.top-banner.update{background:#1A2A4A;color:#fff;border-bottom:1px solid #2A4A8A}
.top-banner .grow{flex:1;min-width:140px}
.top-banner button,.top-banner a{padding:3px 9px;border-radius:5px;border:1px solid currentColor;background:transparent;color:inherit;cursor:pointer;font-size:11px;text-decoration:none}
.top-banner button:hover,.top-banner a:hover{background:rgba(255,255,255,.12)}
.top-banner .ghost{opacity:.7;border-color:transparent}
.saved-stamp{font-size:10px;color:rgba(255,255,255,.7);margin-left:4px;white-space:nowrap}
.share-tabs{display:flex;gap:5px;margin-bottom:10px}
.share-tab{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px}
.share-tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.gpa-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.gpa-stat{padding:11px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);text-align:center}
.gpa-stat .v{font-size:22px;font-weight:700;color:var(--accent);line-height:1.1}
.gpa-stat .l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.gpa-target{padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:14px}
.gpa-target label{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gpa-target input{width:80px;padding:4px 8px;border:1px solid var(--border2);border-radius:5px;font-size:13px;background:var(--surface);color:var(--text);outline:none}
.gpa-target .res{margin-top:7px;font-size:12px;color:var(--text)}
.gpa-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px}
.gpa-row:last-child{border-bottom:none}
.gpa-row .gcode{font-weight:700;flex:0 0 80px}
.gpa-row .gname{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gpa-row .gcr{flex:0 0 32px;text-align:right;color:var(--text3);font-size:10px}
.gpa-row select{padding:3px 6px;border:1px solid var(--border2);border-radius:4px;font-size:11px;background:var(--surface);color:var(--text);outline:none;flex:0 0 70px}
.gpa-sec{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:8px 10px 4px;border-bottom:1px solid var(--border);background:var(--surface2)}
.sres{display:flex;flex-direction:column;gap:5px;margin-top:10px;max-height:380px;overflow-y:auto}
.sres-row{padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);cursor:pointer;display:flex;gap:8px;align-items:center}
.sres-row:hover{background:var(--border)}
.sres-row .sr-code{font-weight:700;font-size:12px;flex:0 0 90px}
.sres-row .sr-name{flex:1;font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sres-row .sr-loc{font-size:10px;color:var(--text3);flex-shrink:0}
.sres-empty{padding:18px;text-align:center;color:var(--text3);font-size:11px}
.hist-row{padding:9px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hist-row .hr-when{font-size:11px;font-weight:600}
.hist-row .hr-sum{font-size:10px;color:var(--text3);margin-top:2px}
.hist-row button{padding:4px 10px;font-size:10px;border-radius:5px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer}
.hist-row button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.tk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
@media(max-width:600px){.tk-grid{grid-template-columns:1fr}}
.tk-card{padding:10px 12px;border:2px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface2)}
.tk-card:hover{border-color:var(--border2)}
.tk-card.sel{border-color:var(--accent);background:var(--surface)}
.tk-name{font-size:12px;font-weight:600}
.tk-grad{font-size:10px;color:var(--text3);margin-top:2px}
.tk-prog{padding:10px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:10px}
.tk-prog .tp-bar{height:5px;background:var(--border);border-radius:3px;margin-top:6px;overflow:hidden}
.tk-prog .tp-fill{height:100%;background:var(--green)}
.tk-list{font-size:11px;color:var(--text2);line-height:1.7}
.tk-list .ok{color:var(--green);font-weight:600}
.tk-list .miss{color:var(--text3)}
.tk-list .pick{cursor:pointer}
.tk-list .pick:hover{color:var(--text)}
.tk-list .dim{opacity:.45;cursor:not-allowed}
.tk-limit{font-size:11px;margin:-2px 0 8px;padding:6px 10px;border-radius:6px;line-height:1.4}
.tk-limit.ok{color:var(--text2);background:var(--surface2)}
.tk-limit.full{color:var(--accent);background:rgba(191,58,31,.08);border:1px solid rgba(191,58,31,.25)}
.tk-flash{font-size:11px;color:var(--accent);margin:0 0 8px;min-height:16px}
.tk-h{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);margin:10px 0 5px}
.kb-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.kb-row:last-child{border-bottom:none}
.kb-key{font-family:monospace;font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:4px;border:1px solid var(--border2)}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:200}
/* Saved pulse */
.saved-pulse{position:fixed;right:14px;bottom:14px;background:var(--green);color:#fff;font-size:11px;padding:5px 11px;border-radius:7px;opacity:0;pointer-events:none;z-index:90;transition:opacity .25s;box-shadow:0 4px 14px rgba(0,0,0,.25)}
.saved-pulse.on{opacity:.95;animation:savedBob .9s ease-out}
@keyframes savedBob{0%{transform:translateY(8px);opacity:0}25%{transform:translateY(0);opacity:.95}80%{opacity:.95}100%{opacity:0}}
/* Inline grade pill — clickable on done courses */
.cgrade.editable{cursor:pointer;border:1px dashed var(--border2)}
.cgrade.editable:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.cgrade-pop{position:absolute;background:var(--surface);border:1px solid var(--border2);border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.18);padding:4px;z-index:60;display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.cgrade-pop button{padding:4px 8px;font-size:10px;border:1px solid transparent;background:transparent;color:var(--text);border-radius:4px;cursor:pointer}
.cgrade-pop button:hover{background:var(--accent);color:#fff}
.cgrade-pop button.clr{color:var(--text3);grid-column:span 4;border-top:1px solid var(--border);margin-top:2px;padding-top:5px}
/* Touch drag */
.cc.touching{opacity:.4}
.touch-ghost{position:fixed;pointer-events:none;z-index:300;background:var(--surface);border:2px solid var(--accent);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:600;box-shadow:0 8px 22px rgba(0,0,0,.25);transform:translate(-50%,-50%)}
/* Lazy-render compare cards. Browsers skip layout for offscreen .csc cards. */
.csc{content-visibility:auto;contain-intrinsic-size:auto 200px}
/* Catalog autocomplete results */
.ac-pop{position:absolute;background:var(--surface);border:1px solid var(--border2);border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.18);max-height:220px;overflow-y:auto;z-index:50;font-size:12px;min-width:260px}
.ac-row{padding:6px 10px;cursor:pointer;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border)}
.ac-row:last-child{border-bottom:none}
.ac-row:hover,.ac-row.on{background:var(--accent);color:#fff}
.ac-row .ac-code{font-weight:700;flex:0 0 80px}
.ac-row .ac-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-row .ac-cr{font-size:10px;opacity:.7;flex-shrink:0}
.ac-empty{padding:8px 10px;font-size:11px;color:var(--text3)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media print{
  body{background:#fff;color:#000}
  .hdr{background:#fff;color:#000;border-bottom:2px solid #000;padding:8px 0}
  .hdr-btns,.hbtn,.sched-pill,.track-pill,.nav,.cmp-bar,.ep,.mbk,.tab-warn,.seltb,.cacts,.sbtn,.cmp-exit,.asf,#confetti{display:none!important}
  .main{padding:0}
  .sc{border:1px solid #999;page-break-inside:avoid;break-inside:avoid;margin-bottom:8px}

  .cc{break-inside:avoid;border:1px solid #ddd}
  .stat{background:#f0f0f0;color:#000}
  .pbar,.sprg{display:none}
  .yr-lbl{color:#000;border-bottom:1px solid #000;padding-bottom:2px;margin-top:10px}
  .sem-row{display:grid!important;grid-template-columns:1fr 1fr!important}
  .sem-row.full{grid-template-columns:1fr!important}
}

// User-added courses use 'u' prefix (uid()) so they can be excluded as 'extra'.

function isRequired(c){
  if(c?.req===false)return false;
  if(c?.req===true)return true;
  if(c?.note==='Track core'||c?.note==='Track elective')return true;
  const id=String(c?.id||'');

  const m=/^c(\d+)$/.exec(id);

}

function isAdvTechPlaceholder(code){

function isFreeElectivePlaceholder(code){

function isDegreePlaceholderCode(code){

function defaultCreditsForPlaceholder(code){

function hasCourseNumber(code){

function parseCreditsFromCode(code){
  if(isDegreePlaceholderCode(code))return defaultCreditsForPlaceholder(code);
  const nums=[...String(code||'').trim().toUpperCase().matchAll(/(\d+)/g)];
  if(!nums.length)return 3;

function syncCourseCredits(c){

  if(isDegreePlaceholderCode(c.code))return{...c,credits:defaultCreditsForPlaceholder(c.code)};
  if(!hasCourseNumber(c.code))return c;

function versionCmp(a,b){

// In-place update flow:
//   1. fetch the new HTML from raw GitHub
//   2. on supported browsers (Chrome/Edge/Opera) use showOpenFilePicker so the
//      user PICKS THEIR EXISTING FILE to overwrite — no ambiguity about which
//      file they're updating
//   3. compare the picked filename to the running file; warn if different
//   4. fall back to a regular download otherwise
//   5. after saving, prompt the user to reload — same file = same localStorage,
//      so their plan stays intact
function currentFileName(){
  try{
    const p=decodeURIComponent(location.pathname||'');
    const m=p.match(/[^/\\]+$/);
    return m?m[0]:'';
  }catch(e){return'';}
}
// File System Access API only works in secure contexts (https/localhost) — not file://.
function canUseFilePicker(){
  return!!(window.isSecureContext&&typeof window.showOpenFilePicker==='function');
}
function readUpdateVerify(){
  try{
    const raw=localStorage.getItem(UPDATE_VERIFY_KEY);
    if(!raw)return null;
    const o=JSON.parse(raw);
    if(!o?.expected)return null;
    if(o.at&&Date.now()-o.at>7*86400000){clearUpdateVerify();return null;}
    return o;
  }catch(e){return null;}
}
function clearUpdateVerify(){try{localStorage.removeItem(UPDATE_VERIFY_KEY);}catch(e){}}
function reloadPlanner(){
  const u=S.update||{};
  const expected=u.state==='verify-failed'?(u.expected||u.latest):u.latest;
  if(expected&&(u.state==='applied'||u.state==='downloaded'||u.state==='verify-failed')){
    try{
      localStorage.setItem(UPDATE_VERIFY_KEY,JSON.stringify({
        expected,runFile:currentFileName(),at:Date.now(),
      }));
    }catch(e){}
  }
  const base=location.href.split(/[?#]/)[0];
  location.replace(base+'?_='+Date.now());
}
function downloadPlannerHtml(html,filename){
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename||'college-course-planner.html';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function applyUpdate(){
  if(typeof fetch!=='function'){alert('Your browser cannot fetch updates here.');return;}
  const prevState=S.update?.state||'idle';
  S.update={...S.update,state:'applying',_prevState:prevState,error:null,savedAs:null,nameMismatch:false};render();
  try{
    const res=await fetch(UPDATE_URL+'?v='+Date.now(),{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const html=await res.text();
    const latestMatch=html.match(/const APP_VERSION=['"]([^'"]+)['"]/);
    const latest=latestMatch?latestMatch[1]:S.update.latest;
    // In-place overwrite only works on https/localhost — not when opened as a local file.
    if(canUseFilePicker()){
      try{
        const [handle]=await window.showOpenFilePicker({
          types:[{description:'College Course Planner',accept:{'text/html':['.html','.htm']}}],
          multiple:false,
        });
        const perm=await handle.requestPermission({mode:'readwrite'});
        if(perm!=='granted')throw new Error('Permission denied for write access.');
        const writable=await handle.createWritable();
        await writable.write(new Blob([html],{type:'text/html'}));
        await writable.close();
        const savedAs=handle.name||'(unknown)';
        const expected=currentFileName();
        const nameMismatch=!!expected&&savedAs.toLowerCase()!==expected.toLowerCase();
        S.update={...S.update,state:'applied',latest,savedAs,nameMismatch};render();
        return;
      }catch(err){
        if(err&&err.name==='AbortError'){
          const restore=S.update._prevState||'current';
          S.update={...S.update,state:restore,error:'File selection cancelled.'};render();return;
        }
        // NotAllowedError and other FSA errors → fall through to download
      }
    }
    const dlName=currentFileName()||'college-course-planner.html';
    downloadPlannerHtml(html,dlName);
    S.update={...S.update,state:'downloaded',latest,downloadedAs:dlName};render();
  }catch(err){
    const restore=S.update._prevState||'offline';
    S.update={...S.update,state:restore,error:err?.message||String(err)};
    alert('Could not download the update: '+(err?.message||err));
    render();
  }
}

async function checkForUpdates(showModal=false){
  const pending=readUpdateVerify();
  if(pending)showModal=true;
  if(showModal){S.modal='update';}
  if(typeof fetch!=='function'){
    S.update={state:'offline',latest:null,checkedAt:Date.now(),error:'fetch unavailable'};render();return;
  }
  try{
    S.update={state:pending?'verifying':'checking',latest:null,checkedAt:null,error:null,expected:pending?.expected||null};
    if(showModal)render();
    const res=await fetch(UPDATE_URL+'?v='+Date.now(),{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    const latest=(text.match(/const APP_VERSION=['"]([^'"]+)['"]/)||[])[1];
    if(!latest)throw new Error('Missing version');
    if(pending){
      if(versionCmp(APP_VERSION,pending.expected)>=0){
        S.update={state:'verified',latest,expected:pending.expected,checkedAt:Date.now(),error:null};
        clearUpdateVerify();
      }else{
        const runFile=currentFileName();
        S.update={
          state:'verify-failed',latest,expected:pending.expected,checkedAt:Date.now(),
          pendingRunFile:pending.runFile||'',
          fileMismatch:!!(pending.runFile&&runFile&&pending.runFile.toLowerCase()!==runFile.toLowerCase()),
          error:`Still running v${APP_VERSION} — expected at least v${pending.expected} after reload.`,
        };
      }
      if(typeof document!=='undefined')document.title='College Course Planner';
      render();
      return;
    }
    const available=versionCmp(latest,APP_VERSION)>0;
    S.update={state:available?'available':'current',latest,checkedAt:Date.now(),error:null};
    if(available){
      try{const dismissed=localStorage.getItem(UPDATE_DISMISS_KEY);S.updateDismissed=dismissed===latest;}catch(e){S.updateDismissed=false;}
    }
    if(showModal&&typeof document!=='undefined')document.title=available?'(update) College Course Planner':'College Course Planner';
  }catch(err){
    S.update={state:'offline',latest:null,checkedAt:Date.now(),error:err?.message||String(err),expected:pending?.expected||null};
  }
  render();
}

// Shared BBA core courses → Canfield honors equivalents. Course names get
// " Honors" suffixed; codes get the H suffix per UT McCombs conventions.
const HONORS_MAP={
  'MAN 101':'MAN 101H','B A 101':'B A 101H','B A 324':'B A 324H','STA 235':'STA 235H',
  'STA 301':'STA 301H','MIS 301':'MIS 301H','ACC 311':'ACC 311H','ACC 312':'ACC 312H',
  'D S 235':'D S 235H','O M 235':'O M 235H','MAN 336':'MAN 336H','MKT 337':'MKT 337H',
  'FIN 357':'FIN 357H','LEB 323/BGS 337':'LEB 323H',
};
const HONORS_REVERSE=Object.fromEntries(Object.entries(HONORS_MAP).map(([k,v])=>[v,k]));
function applyHonorsSwap(sems,honorsOn){
  return sems.map(sem=>({...sem,courses:sem.courses.map(c=>{
    const code=String(c.code||'').trim();
    if(honorsOn&&HONORS_MAP[code]){
      const h=HONORS_MAP[code];
      const nm=/honors/i.test(c.name||'')?c.name:(c.name||'').replace(/\s*$/,'')+' Honors';
      return {...c,code:h,name:nm};
    }
    if(!honorsOn&&HONORS_REVERSE[code]){
      const base=HONORS_REVERSE[code];
      const nm=(c.name||'').replace(/\s*Honors\s*$/i,'').trim();
      return {...c,code:base,name:nm};
    }
    return c;
  })}));
}
// Drop auto-generated track courses whose code already appears in earlier sems.
// Custom/user-edited base courses keep their original `b<N>` IDs and aren't touched.
// Manual additions (`uid()`-based IDs) are also untouched.
function pruneTrackDupes(earlierSems,trackCourses){
  const codes=new Set();
  for(const sem of earlierSems)for(const c of sem.courses){
    const k=String(c.code||'').trim().toUpperCase();if(k)codes.add(k);
  }
  return trackCourses.filter(c=>{
    const k=String(c.code||'').trim().toUpperCase();
    return !k||!codes.has(k);
  });
}
function syncBusinessTracks(sch,nextTracks=businessTrackKeys(sch)){
  const clean=businessTrackKeys({bizTracks:nextTracks});
  const majorKey=clean.find(k=>BUSINESS_TRACKS[k].kind==='major')||null;
  const canfieldKey=clean.includes('canfield')?'canfield':null;
  const prev=new Map((sch.sems||[]).map(s=>[s.id,s]));
  const baseIds=new Set(BUSINESS_DS.map(s=>s.id));
  let baseRaw=(sch.sems?.length?sch.sems:dc(BUSINESS_DS)).filter(s=>baseIds.has(s.id)&&s.id!=='major'&&s.id!=='canfield');
  // Migration: add any missing base sems (e.g. y1f-y4s for older biz schedules) as empty.
  const have=new Set(baseRaw.map(s=>s.id));
  for(const ds of BUSINESS_DS){
    if(ds.id==='major'||ds.id==='canfield'||have.has(ds.id))continue;
    baseRaw.push({id:ds.id,label:ds.label,courses:[]});
  }
  const ord=new Map(BUSINESS_DS.map((ds,i)=>[ds.id,i]));
  baseRaw.sort((a,b)=>(ord.get(a.id)??99)-(ord.get(b.id)??99));
  const base=applyHonorsSwap(baseRaw,!!canfieldKey);
  const major=majorKey
    ?{id:'major',label:'Major Track - '+BUSINESS_TRACKS[majorKey].name,courses:pruneTrackDupes(base,businessTrackCourses(majorKey,prev.get('major')))}
    :dc(BUSINESS_DS.find(s=>s.id==='major'));
  const sems=[...base,major];
  if(canfieldKey)sems.push({id:'canfield',label:'Canfield Track - Canfield Business Honors',courses:pruneTrackDupes(sems,businessTrackCourses('canfield',prev.get('canfield')))});
  return {...sch,kind:'business',bizTracks:clean,sems,updatedAt:Date.now()};
}
function toggleBusinessTrack(sch,key){
  if(!BUSINESS_TRACKS[key])return sch;
  const active=businessTrackKeys(sch);
  const has=active.includes(key);
  let next;
  if(has)next=active.filter(k=>k!==key);
  else if(BUSINESS_TRACKS[key].kind==='honors')next=[...active,key];
  else next=[...active.filter(k=>BUSINESS_TRACKS[k].kind==='honors'),key];
  return syncBusinessTracks(sch,next);
}

function trimTrackElectivesToMax(sems,max,trackKey){

function applyTrackToSems(sems,trackKey,{reset=false}={}){
  const t=TRACKS[trackKey];
  if(!t)return sems;
  let sems2=stripAdvTechPlaceholders(reset?removeTrackManagedCourses(sems):sems);
  const slots=['y2s','y3f','y3s','y4f','y4s'].filter(id=>sems2.find(s=>s.id===id&&!s.isOff));
  let si=0;
  for(const core of t.cores){
    const nc=normTrackCode(core.code);
    let found=false;
    sems2=sems2.map(s=>({...s,courses:s.courses.map(c=>{
      if(normTrackCode(c.code)!==nc)return c;
      if(c.note==='Track elective')return c;
      found=true;
      return{...c,code:core.code,name:core.name,cat:categoryForCode(core.code),credits:parseCreditsFromCode(core.code),note:'Track core'};
    })}));
    if(found)continue;
    const semId=slots[si%slots.length]||defaultSemForTrackCourse(sems2,false);
    si++;
    const course=buildTrackCourse(core.code,core.name,'core');
    sems2=sems2.map(s=>s.id!==semId?s:{...s,courses:[...s.courses,course]});
  }

}
function syncTrackSchedule(sch){

  if(!t||coresOnPlan<t.cores.length)sems=applyTrackToSems(sems,sch.track);

function isApprovedTrackElective(trackKey,code){

function removeTrackElectiveFromPlan(sems,code){

function clearTrackElectivesFromPlan(sems){

function eceTrackKind(sch){

function trackElectiveName(code){
  const nc=normTrackCode(code);
  const hit=CATALOG.find(e=>normTrackCode(e.code)===nc);
  return hit?.name||code;

function inferEceKind(sch){
  if(sch?.kind==='general'||sch?.kind==='business')return sch.kind;
  const courses=(sch.sems||[]).flatMap(s=>s.courses||[]);
  if(courses.some(c=>/^(eh|eg)\d+$/.test(String(c.id))))return 'general';

function stripAdvTechPlaceholders(sems){
  return(sems||[]).map(s=>({...s,courses:(s.courses||[]).filter(c=>!isAdvTechPlaceholder(c.code))}));

function resolveTemplateSems(sch){
  if(sch?.kind==='business')return CURRICULUM_TEMPLATES.business.build();
  const kind=inferEceKind(sch);
  const courses=(sch.sems||[]).flatMap(s=>s.courses||[]);
  if(kind==='general'){
    if(courses.some(c=>/^eh\d+$/.test(String(c.id))||String(c.code||'').includes('402H')))
      return CURRICULUM_TEMPLATES.eceHonors.build();
    return CURRICULUM_TEMPLATES.eceGeneral.build();
  }
  if(courses.some(c=>String(c.code||'').startsWith('ECE 302H')))
    return CURRICULUM_TEMPLATES.ecbPrev.build();
  return CURRICULUM_TEMPLATES.ecb.build();
}
function mergeMissingTemplateCourses(sems,templateSems){
  const plan=dc(sems||[]);
  (templateSems||[]).forEach(tSem=>{
    let i=plan.findIndex(s=>s.id===tSem.id);
    if(i<0){plan.push(dc(tSem));return;}
    const toAdd=[];
    (tSem.courses||[]).forEach(tc=>{
      if(scheduleHasCode(plan,tc.code))return;
      toAdd.push(dc(tc));
    });
    if(toAdd.length)plan[i]={...plan[i],courses:[...(plan[i].courses||[]),...toAdd]};
  });
  return plan;
}
function flowchartRank(semId,code,templateSems){
  const tSem=(templateSems||[]).find(s=>s.id===semId);
  if(!tSem)return 9999;
  const k=normTrackCode(code);
  const idx=(tSem.courses||[]).findIndex(c=>{
    const tk=normTrackCode(c.code);
    return tk===k||tk.startsWith(k)||k.startsWith(tk);
  });
  return idx<0?9999:idx;
}
function reorderCoursesToTemplate(sems,templateSems){
  return(sems||[]).map(s=>({
    ...s,
    courses:[...(s.courses||[])].sort((a,b)=>{
      const ra=flowchartRank(s.id,a.code,templateSems);
      const rb=flowchartRank(s.id,b.code,templateSems);
      return ra!==rb?ra-rb:String(a.code||'').localeCompare(b.code||'');
    }),
  }));
}
// One-time layout fixes for saves created before flowchart-accurate templates.
function migrateFlowchartLayout(sems,kind){
  let plan=dc(sems||[]);
  const moveCourse=(fromId,toId,code,insertAfterCode)=>{
    const fi=plan.findIndex(s=>s.id===fromId);
    const ti=plan.findIndex(s=>s.id===toId);
    if(fi<0||ti<0)return;
    const nc=normTrackCode(code);
    const c=(plan[fi].courses||[]).find(x=>normTrackCode(x.code)===nc);
    if(!c)return;
    if((plan[ti].courses||[]).some(x=>normTrackCode(x.code)===nc))return;
    plan[fi]={...plan[fi],courses:plan[fi].courses.filter(x=>x!==c)};
    const dest=[...plan[ti].courses];
    let at=0;
    if(insertAfterCode==='__END__')at=dest.length;
    else if(insertAfterCode){
      const ai=dest.findIndex(x=>normTrackCode(x.code)===normTrackCode(insertAfterCode));
      at=ai>=0?ai+1:dest.length;
    }
    dest.splice(at,0,c);
    plan[ti]={...plan[ti],courses:dest};
  };
  moveCourse('y1f','y1s','M 408D',null);
  if(kind==='general'){
    moveCourse('y3f','y3s','ATC-Lab',null);
    moveCourse('y4f','y3s','ECE 364D','ATC-Lab');
  }
  if(kind==='ecb'){
    moveCourse('y4f','y3s','ECE 364D','MKT 337H');
  }
  return plan;
}
const ECB_AP_SLOTS=['M 408C','RHE 306','HIS','GOV 310L','E 316','VAPA'];
const ECE_AP_SLOTS=['M 408C','RHE 306','PHY 303K','PHY 105M','VAPA','GOV 310L','SBS','HIS','E 316'];
function apSlotKey(code){
  const c=normTrackCode(code);
  if(c.startsWith('M 408C'))return 'M 408C';
  if(c.includes('RHE 306'))return 'RHE 306';
  if(c.includes('PHY 303K'))return 'PHY 303K';
  if(c.includes('PHY 105M'))return 'PHY 105M';
  if(c.includes('GOV 310'))return 'GOV 310L';
  if(c.includes('E 316'))return 'E 316';
  if(c.includes('VAPA'))return 'VAPA';
  if(c.includes('HIS'))return 'HIS';
  if(c==='SBS'||c.startsWith('SBS'))return 'SBS';
  return c;
}
function isApSlot(code,kind){
  const slots=kind==='ecb'?ECB_AP_SLOTS:ECE_AP_SLOTS;
  return slots.includes(apSlotKey(code));
}
function resolveApTemplate(sch,kind){
  if(kind==='ecb')return CURRICULUM_TEMPLATES.ecb.build().find(s=>s.id==='ap');
  return resolveTemplateSems({kind:'general',sems:sch?.sems||[]}).find(s=>s.id==='ap');
}
// Keep AP/IB credits in the dedicated row; strip duplicates from semester columns.
function syncApSection(sems,kind){
  const tmplAp=resolveApTemplate({sems},kind);
  if(!tmplAp)return sems;
  let plan=dc(sems||[]);
  if(!plan.some(s=>s.id==='ap'))plan=[dc(tmplAp),...plan];
  const apIdx=plan.findIndex(s=>s.id==='ap');
  const order=(tmplAp.courses||[]).map(c=>apSlotKey(c.code));
  const pulled=[];
  plan=plan.map(s=>{
    if(s.id==='ap'||s.id==='phy')return s;
    return{...s,courses:(s.courses||[]).filter(c=>{
      if(!isApSlot(c.code,kind))return true;
      const k=apSlotKey(c.code);
      pulled.push({...c,note:c.note||'AP / IB credit'});
      return false;
    })};
  });
  const apCourses=[...(plan[apIdx].courses||[])];
  pulled.sort((a,b)=>order.indexOf(apSlotKey(a.code))-order.indexOf(apSlotKey(b.code)));
  for(const c of pulled){
    const k=apSlotKey(c.code);
    if(apCourses.some(x=>apSlotKey(x.code)===k))continue;
    apCourses.push(c);
  }
  plan[apIdx]={...plan[apIdx],courses:apCourses};
  if(kind==='general'){
    const phySem=plan.find(s=>s.id==='phy');
    if(phySem?.courses?.length){
      const fromPhy=(phySem.courses||[]).filter(c=>{
        const k=apSlotKey(c.code);
        return k==='PHY 303K'||k==='PHY 105M';
      });
      fromPhy.forEach(c=>{
        const k=apSlotKey(c.code);
        if(apCourses.some(x=>apSlotKey(x.code)===k))return;
        apCourses.push({...c,note:c.note||'AP / IB credit'});
      });
      plan=plan.filter(s=>s.id!=='phy');
      plan[apIdx]={...plan[apIdx],courses:apCourses};
    }
  }
  return plan;
}
function normalizeSchedule(sch){
  const looksBusiness=(sch.sems||[]).some(s=>['lower','upper','major','canfield','electives','human'].includes(s.id))||(sch.bizTracks||[]).length>0;
  let synced={...sch,sems:syncSemCredits(sch.sems)};
  if(looksBusiness||sch.kind==='business')return syncBusinessTracks({...synced,kind:'business'},businessTrackKeys(synced));
  const kind=inferEceKind(synced)==='general'?'general':'ecb';
  synced={kind,...synced};
  synced={...synced,sems:syncApSection(synced.sems,kind)};
  synced={...synced,sems:migrateFlowchartLayout(synced.sems,kind)};
  return syncTrackSchedule(synced);
}
function makeSchedule(name,color,templateKey='ecb'){
  const t=CURRICULUM_TEMPLATES[templateKey]||CURRICULUM_TEMPLATES.ecb;
  const id=sid();
  const sch={id,name,color,sems:t.build(),createdAt:Date.now(),updatedAt:Date.now(),kind:t.kind||templateKey};
  return normalizeSchedule(sch);
}

// ─── Storage ──────────────────────────────────────────────────────────────────
const SK='cp-v3',SNAPK='cp-snap-v1';
let _saveTimer=null;
let _saveRev=0;            // bumps every mutation; used to invalidate memo caches.
function bumpRev(){_saveRev++;}
let _dirtySinceBackup=false;
const UNLOAD_WARN_KEY='cp-unload-warn';
function unloadWarnEnabled(){try{return localStorage.getItem(UNLOAD_WARN_KEY)!=='off';}catch(e){return true;}}
// Debounced write. Rapid edits (typing in a target field, dragging quickly)
// only commit to disk after 250ms of quiet. beforeunload also flushes.
function save(){
  bumpRev();
  _dirtySinceBackup=true;
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(_saveNow,250);
}
async function _saveNow(){
  _saveTimer=null;
  const d=JSON.stringify({schedules:S.schedules,activeId:S.activeId});
  try{if(window.storage)await window.storage.set(SK,d);else localStorage.setItem(SK,d);}catch(e){}
  try{tabCh?.postMessage({t:'save',ts:Date.now(),id:tabId});}catch(e){}
  S.lastSaved=Date.now();
  showSavedPulse();
  const stamp=document.getElementById('saved-stamp');if(stamp)stamp.textContent='saved '+relTime(S.lastSaved);
}
window.addEventListener('beforeunload',e=>{
  if(_saveTimer){clearTimeout(_saveTimer);_saveNow();}
  if(_dirtySinceBackup&&unloadWarnEnabled()){
    // Browsers ignore custom text and show their generic prompt; reminder shows up either way.
    e.preventDefault();e.returnValue='Save a backup of your plan before closing?';return e.returnValue;
  }
});
function showSavedPulse(){
  const el=document.getElementById('saved-pulse');if(!el)return;
  el.classList.remove('on');void el.offsetWidth;el.classList.add('on');
}
async function load(){
  try{
    let d=null;
    if(window.storage){const r=await window.storage.get(SK);d=r?.value;}else d=localStorage.getItem(SK);
    if(d){const p=JSON.parse(d);if(p.schedules?.length){S.schedules=p.schedules.map(normalizeSchedule);S.activeId=p.activeId||p.schedules[0].id;return true;}}
  }catch(e){}
  return false;
}
function initDefault(){

  S.schedules=[sch];
  S.activeId=sch.id;
}
function encodeShare(){return btoa(encodeURIComponent(JSON.stringify({schedules:S.schedules,activeId:S.activeId})));}
function decodeShare(code){
  const p=JSON.parse(decodeURIComponent(atob(code.trim())));
  if(p.schedules?.length)return {...p,schedules:p.schedules.map(normalizeSchedule)};
  if(Array.isArray(p)&&p.length){const id=sid();return{schedules:[normalizeSchedule({id,name:'Imported',color:COLORS[0],sems:p,createdAt:Date.now(),updatedAt:Date.now()})],activeId:id};}
  throw new Error('bad');

// Auto snapshots — at most once per minute. Up to 20 kept.
function loadSnapshots(){try{return JSON.parse(localStorage.getItem(SNAPK)||'[]');}catch(e){return[];}}
function saveSnapshotNow(reason){
  const list=loadSnapshots();
  list.unshift({ts:Date.now(),reason:reason||'auto',data:{schedules:S.schedules,activeId:S.activeId}});
  while(list.length>20)list.pop();
  try{localStorage.setItem(SNAPK,JSON.stringify(list));}catch(e){}
}
function restoreSnapshot(ts){
  const snap=loadSnapshots().find(s=>s.ts===ts);if(!snap)return;
  pushHistory();
  S.schedules=snap.data.schedules;S.activeId=snap.data.activeId||S.schedules[0]?.id;
  S.modal=null;save();render();
}
function deleteSnapshot(ts){
  const list=loadSnapshots().filter(s=>s.ts!==ts);
  try{localStorage.setItem(SNAPK,JSON.stringify(list));}catch(e){}

}

// Markdown export of the active schedule.
function toMarkdown(){
  let md=`# ${getAct()?.name||'Course Plan'}\n\n`;
  const all=getAS().flatMap(s=>s.courses);
  const tot=all.reduce((t,c)=>t+c.credits,0);
  const done=all.filter(c=>c.done).reduce((t,c)=>t+c.credits,0);
  md+=`**${done} / ${tot} credits completed.** ${all.filter(c=>c.done).length} of ${all.length} courses done.\n\n`;
  const sems=getAS();
  const writeSem=sem=>{
    md+=`## ${sem.label}\n\n`;
    if(sem.isOff){md+=`_${sem.offNote||'No classes this term.'}_\n\n`;return;}
    if(!sem.courses.length){md+=`_No courses._\n\n`;return;}
    for(const c of sem.courses)md+=`- ${c.done?'[x]':'[ ]'} **${c.code}** ${c.name} — ${c.credits}cr${c.grade?` (${c.grade})`:''}${c.note?`  \n  _${c.note}_`:''}\n`;
    md+=`\n`;
  };
  const layout=layoutFor(getAct()),known=knownFor(getAct());
  for(const row of layout)for(const id of row.ids){const s=sems.find(x=>x.id===id);if(s)writeSem(s);}
  for(const s of sems.filter(x=>!known.has(x.id)))writeSem(s);
  return md;
}

// ─── Undo/redo ────────────────────────────────────────────────────────────────
function snapState(){return JSON.stringify({schedules:S.schedules,activeId:S.activeId});}
function pushHistory(){
  const cur=snapState();
  if(HISTORY.past[HISTORY.past.length-1]===cur)return;
  HISTORY.past.push(cur);
  if(HISTORY.past.length>HISTORY.MAX)HISTORY.past.shift();
  HISTORY.future=[];
}
function undo(){
  if(!HISTORY.past.length)return;
  HISTORY.future.push(snapState());
  const p=JSON.parse(HISTORY.past.pop());
  S.schedules=p.schedules;S.activeId=p.activeId;
  save();render();
}
function redo(){
  if(!HISTORY.future.length)return;
  HISTORY.past.push(snapState());
  const p=JSON.parse(HISTORY.future.pop());
  S.schedules=p.schedules;S.activeId=p.activeId;
  save();render();
}

// ─── GPA ──────────────────────────────────────────────────────────────────────
// Defensive: trim/uppercase grade, coerce credits to a number so string credits
// from legacy data or imports don't double up via string multiplication.
function gpaFor(courses){
  let pts=0,hrs=0;
  for(const c of courses){
    if(!c.done)continue;
    const g=String(c.grade??'').trim().toUpperCase();
    if(!g||!(g in GRADE_PTS))continue;
    const p=GRADE_PTS[g];
    if(p==null)continue;
    const cr=Number(c.credits)||0;
    if(!cr)continue;
    pts+=p*cr;hrs+=cr;
  }
  return{pts,hrs,gpa:hrs?pts/hrs:null};
}
// Major GPA is strict: ECE = only ECE-prefix courses; Business = only Business.
// Math/Physics/AdvancedTech roll up into Overall but not into either major GPA.
// Memoized by mutation revision so keystrokes that don't touch the plan
// (search, target-GPA input, etc) don't recompute the GPA panel each render.
let _gpaCache={rev:-1,val:null,actId:null};
function gpaPanel(){
  if(_gpaCache.rev===_saveRev&&_gpaCache.actId===S.activeId)return _gpaCache.val;
  const all=getAS().flatMap(s=>s.courses);
  const val={
    overall:gpaFor(all),
    eceMajor:gpaFor(all.filter(c=>c.cat==='ECE')),
    biz:gpaFor(all.filter(c=>c.cat==='BUSINESS')),
    all,
  };
  _gpaCache={rev:_saveRev,actId:S.activeId,val};
  return val;
}
// Per-semester GPA, computed over each semester's done+graded courses.
let _gpaSemCache={rev:-1,val:null,actId:null};
function gpaPerSem(){
  if(_gpaSemCache.rev===_saveRev&&_gpaSemCache.actId===S.activeId)return _gpaSemCache.val;
  const val=getAS().filter(s=>!s.isOff).map(s=>({sem:s,g:gpaFor(s.courses)}));
  _gpaSemCache={rev:_saveRev,actId:S.activeId,val};
  return val;
}
function gradedRows(){
  const out=[];
  for(const sem of getAS()){
    if(sem.isOff||!sem.courses.length)continue;
    out.push({hdr:sem.label});
    for(const c of sem.courses)out.push({sem,c});
  }
  return out;
}

// Memoized — only recomputes when the schedules change or active id flips.
let _trackCache={rev:-1,val:null,actId:null};
function trackProgress(){
  if(_trackCache.rev===_saveRev&&_trackCache.actId===S.activeId)return _trackCache.val;
  if((getAct()?.kind||'ecb')==='business'){
    _trackCache={rev:_saveRev,actId:S.activeId,val:null};

// ─── Confetti ─────────────────────────────────────────────────────────────────
function fireConfetti(){
  const canvas=document.getElementById('confetti');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const N=160,parts=[];
  for(let i=0;i<N;i++)parts.push({
    x:Math.random()*canvas.width,y:-20-Math.random()*200,
    vx:(Math.random()-.5)*4,vy:2+Math.random()*4,
    s:4+Math.random()*5,r:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.3,
    c:['#BF3A1F','#FFC862','#2A7A47','#185FA5','#7B3FA0','#C04870'][i%6],
  });
  let frames=0;
  (function step(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.r+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.6);ctx.restore();}
    frames++;
    if(frames<260)requestAnimationFrame(step);else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

    </div>
  </div>`;
}

function rDeadlines(sem){
  if(sem.isOff||!sem.courses.length)return'';
  return `<div class="dl-list" title="Approximate UT academic deadlines"><b>UT deadlines:</b> ${UT_DEADLINES.map(d=>`${d.week}: ${d.what}`).join(' · ')}</div>`;
}

function rSem(sem){
  const courses=S.filter?sem.courses.filter(c=>c.cat===S.filter):sem.courses;
  const totalCr=sem.courses.reduce((t,c)=>t+c.credits,0);
  const done=sem.courses.filter(c=>c.done).length;
  const pct=sem.courses.length?done/sem.courses.length*100:0;
  const dov=S.dragOver===sem.id;
  if(sem.isOff)return`<div class="sc off" id="sc-${sem.id}">
    <div class="sh">
      <div class="sh-l"><span class="sh-title">${esc(sem.label)}</span><span class="sh-meta">0cr · off term</span></div>
      <div class="sh-r"><button class="sbtn" data-a="dsem" data-sem="${sem.id}" style="font-size:15px">×</button></div>
    </div>
    <div class="off-note">${esc(sem.offNote||'No classes this term.')}</div>
  </div>`;
  return `<div class="sc${dov?' dov':''}" id="sc-${sem.id}"
      ondragover="event.preventDefault();wDO('${sem.id}')"
      ondrop="wDrop('${sem.id}')" ondragleave="wDL('${sem.id}')">
    <div class="sh">
      <div class="sh-l">
        <span class="sh-title">${esc(sem.label)}</span>
        <span class="sh-meta">${totalCr}cr · ${done}/${sem.courses.length}</span>
      </div>
      <div class="sh-r">
        <button class="sbtn add" data-a="add" data-sem="${sem.id}">+</button>
        <button class="sbtn" data-a="dsem" data-sem="${sem.id}" style="font-size:15px">×</button>
      </div>
    </div>
    <div class="sprg"><div class="sprgf" style="width:${pct}%"></div></div>
    <div class="cl">
      ${courses.length?courses.map(c=>rCourse(sem.id,c)).join(''):'<div class="empty">Drop here · + to add</div>'}
    </div>
    ${rDeadlines(sem)}
  </div>`;
}

function rCmpSem(semId,sA,sB,schA,schB){
  const codesA=new Set((sA?.courses||[]).map(c=>c.code.trim().toUpperCase()));
  const codesB=new Set((sB?.courses||[]).map(c=>c.code.trim().toUpperCase()));
  const shared=[...codesA].filter(c=>codesB.has(c)).length;
  const onlyA=codesA.size-shared,onlyB=codesB.size-shared;
  const label=sA?.label||sB?.label||semId;
  const crA=(sA?.courses||[]).reduce((t,c)=>t+c.credits,0);
  const crB=(sB?.courses||[]).reduce((t,c)=>t+c.credits,0);
  const rCC=(c,side)=>{
    const cat=CATS[c.cat]||CATS.OTHER;
    const isShared=(side==='a'?codesB:codesA).has(c.code.trim().toUpperCase());
    return `<div class="ccc${isShared?'':' o'+side}">
      ${!isShared?`<span class="ccc-lbl ${side}">${side.toUpperCase()}</span>`:''}
      <div style="width:6px;height:6px;border-radius:50%;background:${cat.txt};flex-shrink:0;margin-top:3px"></div>
      <div class="ccc-info"><span class="ccc-code" style="color:${cat.txt}">${esc(c.code)}</span><span class="ccc-name">${esc(c.name)}</span></div>
      <span class="ccc-cr">${c.credits}cr</span>
    </div>`;
  };
  return `<div class="csc">
    <div class="csc-hdr">
      <span class="csc-title">${esc(label)}</span>
      <span class="csc-cr">${crA}cr vs ${crB}cr</span>
      <div class="csc-pills">
        ${shared?`<span class="dpill sh">${shared} shared</span>`:''}
        ${onlyA?`<span class="dpill oa">${onlyA} only in A</span>`:''}
        ${onlyB?`<span class="dpill ob">${onlyB} only in B</span>`:''}
        ${!shared&&!onlyA&&!onlyB?'<span class="csc-cr">both empty</span>':''}
      </div>
    </div>
    <div class="csc-cols">
      <div class="csc-col">
        <div class="csc-col-hdr" style="background:${schA.color}20;color:${schA.color}"><span style="width:7px;height:7px;border-radius:50%;background:${schA.color};display:inline-block;flex-shrink:0"></span>${esc(schA.name)} · ${crA}cr</div>
        ${sA?.courses.length?sA.courses.map(c=>rCC(c,'a')).join(''):'<div class="csc-mt">No courses</div>'}
      </div>
      <div class="csc-div"></div>
      <div class="csc-col">
        <div class="csc-col-hdr" style="background:${schB.color}20;color:${schB.color}"><span style="width:7px;height:7px;border-radius:50%;background:${schB.color};display:inline-block;flex-shrink:0"></span>${esc(schB.name)} · ${crB}cr</div>
        ${sB?.courses.length?sB.courses.map(c=>rCC(c,'b')).join(''):'<div class="csc-mt">No courses</div>'}
      </div>
    </div>
  </div>`;
}

function rCompareView(){
  const schA=getAct(),schB=S.schedules.find(s=>s.id===S.compareId);
  if(!schA||!schB)return'';
  const semsA=schA.sems,semsB=schB.sems;
  const allIds=[...new Set([...semsA.map(s=>s.id),...semsB.map(s=>s.id)])];
  const allA=semsA.flatMap(s=>s.courses),allB=semsB.flatMap(s=>s.courses);
  const cA=new Set(allA.map(c=>c.code.trim().toUpperCase()));
  const cB=new Set(allB.map(c=>c.code.trim().toUpperCase()));
  const shAll=[...cA].filter(c=>cB.has(c)).length;
  const crA=allA.reduce((t,c)=>t+c.credits,0),crB=allB.reduce((t,c)=>t+c.credits,0);
  let body='';
  const layout=layoutFor(schA);
  const known=knownFor(schA);
  for(const row of layout){
    const relevant=row.ids.filter(id=>allIds.includes(id));
    if(!relevant.length)continue;
    if(row.label)body+=`<div class="yr-lbl">${row.label}</div>`;
    for(const id of relevant)body+=rCmpSem(id,semsA.find(s=>s.id===id),semsB.find(s=>s.id===id),schA,schB);
  }
  const customIds=allIds.filter(id=>!known.has(id));
  if(customIds.length){
    body+=`<div class="yr-lbl">Custom Semesters</div>`;
    for(const id of customIds)body+=rCmpSem(id,semsA.find(s=>s.id===id),semsB.find(s=>s.id===id),schA,schB);
  }
  return `<div class="cmp-bar">
    <div class="cmp-tag" style="background:${schA.color}30;color:${schA.color}"><span style="width:8px;height:8px;border-radius:50%;background:${schA.color};display:inline-block;margin-right:5px;vertical-align:middle"></span>A: ${esc(schA.name)} — ${allA.length} courses, ${crA}cr</div>
    <span style="font-size:10px;opacity:.5">vs</span>
    <div class="cmp-tag" style="background:${schB.color}30;color:${schB.color}"><span style="width:8px;height:8px;border-radius:50%;background:${schB.color};display:inline-block;margin-right:5px;vertical-align:middle"></span>B: ${esc(schB.name)} — ${allB.length} courses, ${crB}cr</div>
    <span class="cmp-sum">${shAll} shared · ${cA.size-shAll} unique to A · ${cB.size-shAll} unique to B</span>
    <button class="cmp-exit" onclick="S.compareMode=false;S.compareId=null;render()">✕ Exit Compare</button>
  </div>
  <div class="main">${body}</div>`;
}

function rMain(){
  const sems=getAS();
  const layout=layoutFor(getAct());
  const known=knownFor(getAct());
  let html='';
  if(S.showAddSem)html+=`<div class="asf">
    <select onchange="S.addSemKind=this.value;render()">
      <option value="normal"${S.addSemKind==='normal'?' selected':''}>Custom semester</option>
      <option value="internship"${S.addSemKind==='internship'?' selected':''}>Internship / Co-op (no classes)</option>
      <option value="abroad"${S.addSemKind==='abroad'?' selected':''}>Study Abroad (transfer credits)</option>
    </select>
    <input id="nsn" placeholder="${S.addSemKind==='internship'?'Internship at Acme, Summer 2026':S.addSemKind==='abroad'?'Study Abroad, Spring 2026':'Summer Research 2025'}" autofocus>
    <button data-a="addsem" style="background:var(--accent);color:#fff;border:none">Add</button>
    <button data-a="cancelsem" style="background:transparent;border:1px solid var(--border2);color:var(--text2)">Cancel</button>
  </div>`;
  for(const row of layout){
    const rs=row.ids.map(id=>sems.find(s=>s.id===id)).filter(Boolean);
    if(!rs.length)continue;
    if(row.label)html+=`<div class="yr-lbl">${row.label}</div>`;
    html+=`<div class="sem-row${row.type==='full'||rs.length===1?' full':''}">${rs.map(rSem).join('')}</div>`;
  }
  const custom=sems.filter(s=>!known.has(s.id));
  if(custom.length)html+=`<div class="yr-lbl">Custom Semesters</div><div class="sem-row full">${custom.map(rSem).join('')}</div>`;
  return `<div class="main">${html}</div>`;
}

      <div class="fld"><label>Credits</label><input id="f-credits" type="number" value="${f.credits||3}" min="0" max="20"></div>

    <div class="ea">

function rSelToolbar(){
  if(!S.selection.size)return'';
  const sems=getAS().filter(s=>!s.isOff&&s.id!==S.selectionSem);
  const opts=sems.map(s=>`<option value="${s.id}">${esc(s.label)}</option>`).join('');

    <b>${S.selection.size} selected</b>
    <select id="bulkdest"><option value="">Move to…</option>${opts}</select>

    <button onclick="clearSel()" style="margin-left:auto">Clear</button>
  </div>`;
}

function rBanners(){
  let html='';
  if(S.update?.state==='available'&&!S.updateDismissed){
    html+=`<div class="top-banner update">
      <span class="grow">⬆ Update available — v${esc(S.update.latest||'?')} is out (you're on v${esc(APP_VERSION)}).</span>
      <button data-a="open-update-modal">${canUseFilePicker()?'Apply update':'Download update'}</button>
      <a href="${esc(RELEASES_URL)}" target="_blank" rel="noopener" class="ghost">What's new</a>
      <button data-a="dismiss-update" class="ghost" title="Dismiss until next version">×</button>
    </div>`;
  }
  if(S.exportReminder&&!S.startNote){
    html+=`<div class="top-banner">
      <span class="grow">💾 It's been a while since your last backup (${esc(relTime(S.lastExportAt))}). Browser storage can get wiped — save a JSON copy.</span>

function rStartNote(){
  const updateAction=S.update?.state==='available'
    ?`<button class="linkbtn p" data-a="open-update-modal">${canUseFilePicker()?'Apply update':'Download update'}</button>`
    :`<button class="linkbtn" data-a="manual-update">Check updates</button>`;

      <div class="mbody">
        <div class="start-title">Save this somewhere you'll remember</div>

        <div class="start-update">${updateLine()}</div>

          <label class="start-check"><input type="checkbox" id="start-suppress" checked> Don't show this again</label>
          ${updateAction}
          <button class="linkbtn p" data-a="hide-start-note">Got it</button>
        </div>
      </div>

  </div>`;
}

function rModal(){
  if(!S.modal)return'';

  if(S.modal==='update'){
    const st=S.update?.state;
    const fsaSupported=canUseFilePicker();
    const isLocalFile=location.protocol==='file:';
    const isHosted=location.protocol==='http:'||location.protocol==='https:';
    const runFile=currentFileName();
    const pathHint=runFile?`<div style="font-size:10px;color:var(--text3);margin-top:8px;padding:6px 9px;background:var(--surface2);border-radius:5px;line-height:1.4">Currently running: <code style="word-break:break-all">${esc(runFile)}</code><br><span style="opacity:.7">Save the download over <b>this exact file</b> in its folder (not Downloads).</span></div>`:'';
    const errLine=S.update?.error?`<p style="font-size:12px;color:#C00;line-height:1.45;margin-bottom:8px">${esc(S.update.error)}</p>`:'';
    let body='';
    if(st==='applied'){
      const savedAs=S.update.savedAs||'(unknown)';
      const mismatch=S.update.nameMismatch;
      body=`<p style="font-size:13px;color:var(--green);line-height:1.45;margin-bottom:8px">✓ New version written to <code>${esc(savedAs)}</code>.</p>
        ${mismatch?`<p style="font-size:12px;color:#C00;background:#FEE;padding:7px 10px;border-radius:6px;line-height:1.45;margin-bottom:8px">⚠ The file you picked (<code>${esc(savedAs)}</code>) doesn't match the file this tab is running (<code>${esc(runFile)}</code>). Reloading won't help — open <code>${esc(savedAs)}</code> directly instead, or run Apply again and pick the right file.</p>`:`<p style="font-size:12px;color:var(--text2);line-height:1.45;margin-bottom:8px">Click <b>Reload now</b> to run the new version. Your autosaved plan stays in this browser.</p>`}
        <p style="font-size:11px;color:var(--text3);line-height:1.45">After reload, this modal will show <b>"You are up to date on v${esc(S.update.latest||'?')}"</b> — that's how you'll know it worked.</p>`;
    }else if(st==='downloaded'){
      const dlAs=S.update.downloadedAs||'college-course-planner.html';
      body=`<p style="font-size:13px;color:var(--green);line-height:1.45;margin-bottom:8px">📥 Downloaded <code>${esc(dlAs)}</code> — check your browser's download bar or Downloads folder.</p>
        <p style="font-size:12px;color:var(--text2);line-height:1.45;margin-bottom:8px"><b>Move/replace</b> that file over your existing planner (same folder and name), then click <b>Reload now</b>. Your autosaved plan stays in this browser.</p>
        ${pathHint}`;
    }else if(st==='applying'||st==='verifying'){
      body=`<p style="font-size:13px;color:var(--text2);line-height:1.45">${st==='verifying'?'⏳ Verifying your update after reload…':'⏳ Fetching the latest version…'}</p>`;
    }else if(st==='verified'){
      body=`<p style="font-size:13px;color:var(--green);line-height:1.45;margin-bottom:8px">✓ ${updateLine()}</p>
        <p style="font-size:12px;color:var(--text2);line-height:1.45">GitHub latest: <b>v${esc(S.update.latest||'?')}</b>. Your plan data is unchanged.</p>`;
    }else if(st==='verify-failed'){
      const fileWarn=S.update.fileMismatch?`<p style="font-size:12px;color:#854F0B;background:var(--core-bg);padding:7px 10px;border-radius:6px;line-height:1.45;margin-bottom:8px">This tab is running <code>${esc(runFile)}</code> but you were updating <code>${esc(S.update.pendingRunFile)}</code> — open the replaced file directly.</p>`:'';
      body=`${errLine}<p style="font-size:13px;color:#C00;line-height:1.45;margin-bottom:8px">⚠ ${updateLine()}</p>
        ${fileWarn}
        <p style="font-size:12px;color:var(--text2);line-height:1.45;margin-bottom:8px">Replace <code>${esc(runFile||'college-course-planner.html')}</code> with the downloaded file (same folder and name), then click <b>Reload now</b> to verify again.</p>
        ${pathHint}`;
    }else{
      const localWarn=isLocalFile&&!fsaSupported?`<p style="font-size:12px;color:#854F0B;background:var(--core-bg);padding:7px 10px;border-radius:6px;line-height:1.45;margin-bottom:8px">Local files can't be overwritten in-place from the browser. <b>Download update</b> saves a fresh copy — replace your existing file with it, then reload.</p>`:'';
      const hostedWarn=isHosted?`<p style="font-size:12px;color:#854F0B;background:var(--core-bg);padding:7px 10px;border-radius:6px;line-height:1.45;margin-bottom:8px">⚠ This tab is loaded from <code>${esc(location.protocol)}//…</code>, not a local file. You can't overwrite a hosted file from the browser — download the update and run it locally.</p>`:'';
      body=`${errLine}<p style="font-size:13px;color:var(--text2);line-height:1.45;margin-bottom:10px">${updateLine()}</p>
        ${localWarn}${hostedWarn}
        <p style="font-size:11px;color:var(--text3);line-height:1.45">${fsaSupported
          ?'Click <b>Apply update</b> — your browser will ask you to <b>pick your existing planner file</b> so the new version writes directly over it.'
          :'Click <b>Download update</b> to grab the new file, then replace your existing copy in the same folder.'}</p>
        ${pathHint}
        <p style="font-size:10px;color:var(--text3);margin-top:8px">Or <a href="${esc(DOWNLOAD_URL)}" target="_blank" rel="noopener">download from GitHub Releases</a> if the button doesn't work.</p>`;
    }
    const applyBtn=(st!=='applied'&&st!=='applying'&&st!=='downloaded'&&st!=='verified'&&st!=='verifying')
      ?`<button class="linkbtn p" data-a="apply-update">${fsaSupported?'Apply update':'Download update'}</button>`:'';
    const reloadBtn=(st==='applied'&&!S.update.nameMismatch)||st==='downloaded'||st==='verify-failed'
      ?`<button class="linkbtn p" onclick="reloadPlanner()">Reload now</button>`:'';
    const checkBtn=(st!=='applied'&&st!=='applying'&&st!=='verifying')
      ?`<button class="linkbtn" data-a="manual-update">Check again</button>`:'';
    return`<div class="mbk" id="mbk">
      <div class="modal" style="max-width:520px">
        <div class="mhdr"><h3>Planner Updates</h3><button class="mclose" data-a="close-modal">×</button></div>
        <div class="mbody">${body}</div>
        <div class="mfooter">
          ${checkBtn}${applyBtn}${reloadBtn}
          <button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Close</button>
        </div>
      </div>
    </div>`;
  }

  if(S.modal==='export'){
    const tab=S.modalTab||'code';
    const body=tab==='code'?`
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Includes all ${S.schedules.length} schedule(s). Anyone with the code can import your exact plans.</p>
      <textarea class="sta" id="share-code" readonly onclick="this.select()">${esc(encodeShare())}</textarea>
      <span class="copied" id="copy-badge">✓ Copied!</span>`:`
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Markdown version of the active schedule. Paste into an email, Discord, Notion, anywhere plaintext works.</p>
      <textarea class="sta" id="md-out" readonly onclick="this.select()" style="height:240px">${esc(toMarkdown())}</textarea>
      <span class="copied" id="copy-md-badge">✓ Copied!</span>`;
    return`<div class="mbk" id="mbk">
    <div class="modal" style="max-width:560px">
      <div class="mhdr"><h3>📤 Share schedule</h3><button class="mclose" data-a="close-modal">×</button></div>
      <div class="mbody">
        <div class="share-tabs">
          <button class="share-tab${tab==='code'?' on':''}" onclick="S.modalTab='code';render()">Share code</button>
          <button class="share-tab${tab==='md'?' on':''}" onclick="S.modalTab='md';render()">Markdown</button>
        </div>
        ${body}
      </div>
      <div class="mfooter">
        <button onclick="${tab==='md'?`copyText('md-out','copy-md-badge')`:`copyCode()`}" style="padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">Copy</button>
        <button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Close</button>
      </div>
    </div></div>`;
  }

  if(S.modal==='import')return`<div class="mbk" id="mbk">
    <div class="modal" style="max-width:480px">
      <div class="mhdr"><h3>📥 Import schedules</h3><button class="mclose" data-a="close-modal">×</button></div>
      <div class="mbody">
        <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Paste a share code to load schedules. <strong>Replaces all current data.</strong></p>
        <textarea class="sta" id="import-code" placeholder="Paste share code here…"></textarea>
        <span id="import-err" style="font-size:11px;color:#C00;display:none">Invalid code.</span>
      </div>

    return`<div class="mbk" id="mbk">

  if(S.modal==='kbhelp'){
