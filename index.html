<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Planner — UT Austin ECE + Business Honors</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4F0;--surface:#FFFFFF;--surface2:#F2EDE8;--border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --text:#1A1A1A;--text2:#666;--text3:#999;
  --accent:#BF3A1F;--accent-d:#8A2010;--gold:#FFC862;--green:#2A7A47;
  --ece-bg:#FAECE7;--ece-brd:#F5C4B3;--ece-txt:#993C1D;
  --math-bg:#E6F1FB;--math-brd:#B5D4F4;--math-txt:#185FA5;
  --biz-bg:#EEEDFE;--biz-brd:#CECBF6;--biz-txt:#534AB7;
  --core-bg:#FAEEDA;--core-brd:#FAC775;--core-txt:#854F0B;
  --adv-bg:#EAF3DE;--adv-brd:#C0DD97;--adv-txt:#3B6D11;
  --phy-bg:#E1F5EE;--phy-brd:#9FE1CB;--phy-txt:#0F6E56;
  --oth-bg:#F1EFE8;--oth-brd:#D3D1C7;--oth-txt:#5F5E5A;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181614;--surface:#262220;--surface2:#302C2A;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
  --text:#E8E4DF;--text2:#9A9490;--text3:#666;
  --ece-bg:#4A1B0C;--ece-brd:#993C1D;--ece-txt:#F0997B;
  --math-bg:#042C53;--math-brd:#185FA5;--math-txt:#85B7EB;
  --biz-bg:#26215C;--biz-brd:#534AB7;--biz-txt:#AFA9EC;
  --core-bg:#412402;--core-brd:#854F0B;--core-txt:#EF9F27;
  --adv-bg:#173404;--adv-brd:#3B6D11;--adv-txt:#97C459;
  --phy-bg:#04342C;--phy-brd:#0F6E56;--phy-txt:#5DCAA5;
  --oth-bg:#2C2C2A;--oth-brd:#5F5E5A;--oth-txt:#B4B2A9;
}}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--accent);color:#fff;padding:12px 20px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.hdr-sub{font-size:10px;opacity:.75;text-transform:uppercase;letter-spacing:1.2px}
.hdr h1{font-size:17px;font-weight:600;margin:2px 0 4px}
.sched-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);cursor:pointer;font-size:11px;transition:background .1s}
.sched-pill:hover{background:rgba(255,255,255,.25)}
.sched-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.track-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);cursor:pointer;font-size:10px;transition:background .1s}
.track-pill:hover{background:rgba(255,255,255,.25)}
.hdr-right{display:flex;flex-direction:column;gap:7px;align-items:flex-end;flex-shrink:0}
.stats{display:flex;gap:7px}
.stat{background:rgba(0,0,0,.22);border-radius:7px;padding:5px 11px;text-align:center}
.stat .v{font-size:15px;font-weight:600;line-height:1.2}
.stat .l{font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.4px}
.hdr-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.hbtn{padding:3px 9px;border-radius:5px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:11px;transition:background .1s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.28)}
.hbtn.ghost{background:transparent;border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.65)}
.hbtn:disabled{opacity:.4;cursor:not-allowed}
.pbar{height:3px;background:rgba(255,255,255,.25);border-radius:2px;margin-top:10px}
.pfill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.nav-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.fbtn{padding:3px 9px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;transition:all .1s}
.fbtn:hover{background:var(--surface2)}
.fbtn.on{background:var(--text);color:var(--surface);border-color:var(--text)}
.nav-right{margin-left:auto;display:flex;gap:5px}
.nsm{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);white-space:nowrap}
.nsm:hover{background:var(--border)}
.nsm.p{background:var(--accent);color:#fff;border-color:var(--accent)}
.nsm.p:hover{background:var(--accent-d)}
.tab-warn{background:#7A4A00;color:#fff;padding:6px 16px;font-size:11px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.tab-warn button{padding:3px 9px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:10px}
.seltb{background:#1A2A4A;color:#fff;padding:7px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.seltb b{font-size:12px}
.seltb button{padding:3px 9px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:5px;cursor:pointer;font-size:11px}
.seltb button:hover{background:rgba(255,255,255,.28)}
.seltb select{padding:3px 8px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:5px;font-size:11px}
.seltb select option{background:#1A2A4A;color:#fff}
.cmp-bar{background:#1A2A4A;color:#fff;padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:2px solid #2A4A8A}
.cmp-tag{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600}
.cmp-sum{font-size:10px;opacity:.65;margin-left:4px}
.cmp-exit{margin-left:auto;padding:4px 11px;border-radius:5px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;cursor:pointer;font-size:11px}
.cmp-exit:hover{background:rgba(255,255,255,.1)}
.ep{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px}
.ep h3{font-size:13px;font-weight:600;margin-bottom:12px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fg.three{grid-template-columns:1fr 1fr 1fr}
.fld{display:flex;flex-direction:column;gap:3px}
.fld.full{margin-bottom:8px}
.fld label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.fld input,.fld select{padding:6px 9px;border:1px solid var(--border2);border-radius:6px;font-size:12px;background:var(--surface2);color:var(--text);outline:none;width:100%}
.fld input:focus,.fld select:focus{border-color:var(--accent)}
.ea{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.bdel{padding:5px 11px;background:#FEE;color:#C00;border:1px solid #FCC;border-radius:6px;cursor:pointer;font-size:11px}
.bcancel{padding:5px 11px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:11px;background:transparent;color:var(--text2)}
.bsave{padding:5px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600}
.main{padding:14px 20px}
.yr-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin:4px 0 6px}
.sem-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.sem-row.full{grid-template-columns:1fr}
@media(max-width:600px){.sem-row{grid-template-columns:1fr}}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border .12s,background .12s}
.sc.dov{border:2px dashed var(--accent)!important;background:var(--surface2)}
.sc.off{background:repeating-linear-gradient(45deg,var(--surface),var(--surface) 8px,var(--surface2) 8px,var(--surface2) 16px)}
.sh{padding:7px 11px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.sh-l{display:flex;align-items:baseline;gap:6px;min-width:0;flex:1}
.sh-title{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sh-meta{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.sh-r{display:flex;gap:3px;flex-shrink:0}
.sbtn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;transition:all .1s}
.sbtn:hover{background:var(--border)}
.sbtn.add{background:var(--accent);border-color:var(--accent);color:#fff;font-size:16px}
.sbtn.add:hover{background:var(--accent-d)}
.sprg{height:2px;background:var(--border)}
.sprgf{height:100%;background:var(--green);transition:width .4s}
.cl{padding:7px;display:flex;flex-direction:column;gap:4px;min-height:36px}
.empty{text-align:center;padding:12px;color:var(--text3);font-size:11px;font-style:italic}
.off-note{padding:14px;text-align:center;color:var(--text3);font-size:11px;font-style:italic}
.dl-list{padding:5px 9px;background:var(--surface2);border-top:1px solid var(--border);font-size:10px;color:var(--text2)}
.dl-list b{color:var(--text);font-weight:600}
.cc{display:flex;align-items:flex-start;gap:6px;padding:5px 8px;border-radius:6px;cursor:grab;border:1px solid transparent;transition:transform .1s,box-shadow .1s;user-select:none;position:relative}
.cc:active{cursor:grabbing}
.cc:hover{transform:translateX(2px);box-shadow:0 2px 6px rgba(0,0,0,.1)}
.cc.done{opacity:.5}
.cc.sel{outline:2px solid var(--accent);outline-offset:1px}
.chk{width:15px;height:15px;border-radius:3px;border:1.5px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;margin-top:1px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ci{flex:1;min-width:0}
.ccode{font-size:11px;font-weight:700}
.cname{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-top:1px}
.cnote{font-size:9px;color:var(--text3);font-style:italic;display:block;margin-top:1px}
.cc.done .ccode,.cc.done .cname{text-decoration:line-through}
.crdt{font-size:9px;color:var(--text3);flex-shrink:0;margin-top:2px}
.cgrade{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--surface2);color:var(--text2);margin-top:1px}
.ebtn{display:none;width:18px;height:18px;border-radius:3px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:11px;color:var(--text2);align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.cc:hover .ebtn{display:flex}
.csc{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.csc-hdr{padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.csc-title{font-size:12px;font-weight:600}
.csc-cr{font-size:10px;color:var(--text3)}
.csc-pills{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.dpill{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:500;white-space:nowrap}
.dpill.sh{background:#EAF3DE;color:#3B6D11}
.dpill.oa{background:#FEF3DC;color:#7A4A00}
.dpill.ob{background:#E6F1FB;color:#185FA5}
@media(prefers-color-scheme:dark){
  .dpill.sh{background:#173404;color:#97C459}
  .dpill.oa{background:#3A2200;color:#F0C060}
  .dpill.ob{background:#042C53;color:#85B7EB}
}
.csc-cols{display:grid;grid-template-columns:1fr 1fr}
.csc-col{padding:6px;min-height:36px}
.csc-col-hdr{font-size:10px;font-weight:600;padding:3px 7px;margin-bottom:4px;display:flex;align-items:center;gap:5px;border-radius:4px}
.ccc{display:flex;align-items:flex-start;gap:5px;padding:4px 7px;border-radius:5px;border:1px solid transparent;margin-bottom:3px}
.ccc.oa{background:#FFFBE8;border-color:#F0D080}
.ccc.ob{background:#EEF6FF;border-color:#B0D0F0}
@media(prefers-color-scheme:dark){.ccc.oa{background:#2A1E00;border-color:#6A4800}.ccc.ob{background:#001830;border-color:#184870}}
.ccc-lbl{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0;margin-top:2px}
.ccc-lbl.a{background:#F0D080;color:#5A3800}
.ccc-lbl.b{background:#B0D0F0;color:#083070}
@media(prefers-color-scheme:dark){.ccc-lbl.a{background:#6A4800;color:#F0D080}.ccc-lbl.b{background:#184870;color:#B0D0F0}}
.ccc-info{flex:1;min-width:0}
.ccc-code{font-size:10px;font-weight:700}
.ccc-name{font-size:9px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.ccc-cr{font-size:9px;color:var(--text3);flex-shrink:0;margin-top:2px}
.csc-div{width:1px;background:var(--border)}
.csc-mt{padding:10px;color:var(--text3);font-size:10px;font-style:italic;text-align:center}
.asf{border:1px dashed var(--border2);border-radius:10px;padding:9px 12px;background:var(--surface2);display:flex;gap:7px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.asf input{flex:1;min-width:160px;padding:5px 9px;border:1px solid var(--border2);border-radius:6px;font-size:12px;background:var(--surface);color:var(--text);outline:none}
.asf select{padding:5px 9px;border:1px solid var(--border2);border-radius:6px;font-size:11px;background:var(--surface);color:var(--text);outline:none}
.asf button{padding:5px 11px;font-size:11px;border-radius:6px;cursor:pointer}
.mbk{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--surface);border-radius:14px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;display:flex;flex-direction:column}
.mhdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhdr h3{font-size:15px;font-weight:600}
.mclose{width:26px;height:26px;border-radius:6px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center}
.mbody{padding:16px 20px;overflow-y:auto;flex:1}
.mfooter{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;align-items:center;flex-shrink:0}
.mfooter .left{margin-right:auto;font-size:11px;color:var(--text3)}
.slist{display:flex;flex-direction:column;gap:8px}
.si{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2)}
.si.act{border-color:var(--accent);background:var(--surface)}
.si-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.si-info{flex:1;min-width:0}
.si-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-name input{width:100%;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text);outline:none;border-bottom:1px solid var(--accent)}
.si-meta{font-size:10px;color:var(--text3);margin-top:2px}
.si-acts{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.sa{padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2)}
.sa:hover{background:var(--border)}
.sa.act-badge{background:var(--accent);color:#fff;border-color:var(--accent);cursor:default}
.sa.d{color:#C00;border-color:#FCC}
.sa.d:hover{background:#FEE}
.cpg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cpi{padding:12px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .1s;text-align:center}
.cpi:hover{border-color:var(--border2)}
.cpi.sel{border-color:var(--accent)}
.cpi-dot{width:12px;height:12px;border-radius:50%;margin:0 auto 6px}
.cpi-name{font-size:12px;font-weight:600}
.cpi-meta{font-size:10px;color:var(--text3);margin-top:3px}
.sta{width:100%;height:90px;padding:9px;border:1px solid var(--border2);border-radius:7px;font-family:monospace;font-size:10px;background:var(--surface2);color:var(--text);resize:vertical;outline:none;margin-bottom:10px}
.copied{font-size:11px;color:var(--green);display:none}
.copied.show{display:block}
.share-tabs{display:flex;gap:5px;margin-bottom:10px}
.share-tab{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px}
.share-tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.gpa-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.gpa-stat{padding:11px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);text-align:center}
.gpa-stat .v{font-size:22px;font-weight:700;color:var(--accent);line-height:1.1}
.gpa-stat .l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.gpa-target{padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:14px}
.gpa-target label{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gpa-target input{width:80px;padding:4px 8px;border:1px solid var(--border2);border-radius:5px;font-size:13px;background:var(--surface);color:var(--text);outline:none}
.gpa-target .res{margin-top:7px;font-size:12px;color:var(--text)}
.gpa-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px}
.gpa-row:last-child{border-bottom:none}
.gpa-row .gcode{font-weight:700;flex:0 0 80px}
.gpa-row .gname{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gpa-row .gcr{flex:0 0 32px;text-align:right;color:var(--text3);font-size:10px}
.gpa-row select{padding:3px 6px;border:1px solid var(--border2);border-radius:4px;font-size:11px;background:var(--surface);color:var(--text);outline:none;flex:0 0 70px}
.gpa-sec{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:8px 10px 4px;border-bottom:1px solid var(--border);background:var(--surface2)}
.sres{display:flex;flex-direction:column;gap:5px;margin-top:10px;max-height:380px;overflow-y:auto}
.sres-row{padding:8px 11px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);cursor:pointer;display:flex;gap:8px;align-items:center}
.sres-row:hover{background:var(--border)}
.sres-row .sr-code{font-weight:700;font-size:12px;flex:0 0 90px}
.sres-row .sr-name{flex:1;font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sres-row .sr-loc{font-size:10px;color:var(--text3);flex-shrink:0}
.sres-empty{padding:18px;text-align:center;color:var(--text3);font-size:11px}
.hist-row{padding:9px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hist-row .hr-when{font-size:11px;font-weight:600}
.hist-row .hr-sum{font-size:10px;color:var(--text3);margin-top:2px}
.hist-row button{padding:4px 10px;font-size:10px;border-radius:5px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer}
.hist-row button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.tk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
@media(max-width:600px){.tk-grid{grid-template-columns:1fr}}
.tk-card{padding:10px 12px;border:2px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface2)}
.tk-card:hover{border-color:var(--border2)}
.tk-card.sel{border-color:var(--accent);background:var(--surface)}
.tk-name{font-size:12px;font-weight:600}
.tk-grad{font-size:10px;color:var(--text3);margin-top:2px}
.tk-prog{padding:10px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:10px}
.tk-prog .tp-bar{height:5px;background:var(--border);border-radius:3px;margin-top:6px;overflow:hidden}
.tk-prog .tp-fill{height:100%;background:var(--green)}
.tk-list{font-size:11px;color:var(--text2);line-height:1.7}

.tk-list .miss{color:var(--text3)}

.kb-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.kb-row:last-child{border-bottom:none}
.kb-key{font-family:monospace;font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:4px;border:1px solid var(--border2)}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:200}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media print{
  body{background:#fff;color:#000}
  .hdr{background:#fff;color:#000;border-bottom:2px solid #000;padding:8px 0}
  .hdr-btns,.hbtn,.sched-pill,.track-pill,.nav,.cmp-bar,.ep,.mbk,.tab-warn,.seltb,.ebtn,.sbtn,.cmp-exit,.asf,#confetti{display:none!important}
  .main{padding:0}
  .sc{border:1px solid #999;page-break-inside:avoid;break-inside:avoid;margin-bottom:8px}
  .sh{background:#f0f0f0;border-bottom:1px solid #999}

  .sem-row{display:grid!important;grid-template-columns:1fr 1fr!important}

}

const SK='cp-v3',SNAPK='cp-snap-v1';
async function save(){
  const d=JSON.stringify({schedules:S.schedules,activeId:S.activeId});
  try{if(window.storage)await window.storage.set(SK,d);else localStorage.setItem(SK,d);}catch(e){}
  try{tabCh?.postMessage({t:'save',ts:Date.now(),id:tabId});}catch(e){}
}
async function load(){
  try{
    let d=null;
    if(window.storage){const r=await window.storage.get(SK);d=r?.value;}else d=localStorage.getItem(SK);
    if(d){const p=JSON.parse(d);if(p.schedules?.length){S.schedules=p.schedules;S.activeId=p.activeId||p.schedules[0].id;return true;}}
  }catch(e){}
  return false;
}

  S.schedules=[{id,name:'Main Plan',color:COLORS[0],sems:dc(DS),createdAt:Date.now(),updatedAt:Date.now(),kind:'ecb'}];

}
function encodeShare(){return btoa(encodeURIComponent(JSON.stringify({schedules:S.schedules,activeId:S.activeId})));}
function decodeShare(code){
  const p=JSON.parse(decodeURIComponent(atob(code.trim())));
  if(p.schedules?.length)return p;
  if(Array.isArray(p)&&p.length){const id=sid();return{schedules:[{id,name:'Imported',color:COLORS[0],sems:p,createdAt:Date.now(),updatedAt:Date.now(),kind:'ecb'}],activeId:id};}
  throw new Error('bad');
}

// Auto snapshots — at most once per minute. Up to 20 kept.
function loadSnapshots(){try{return JSON.parse(localStorage.getItem(SNAPK)||'[]');}catch(e){return[];}}
function saveSnapshotNow(reason){
  const list=loadSnapshots();
  list.unshift({ts:Date.now(),reason:reason||'auto',data:{schedules:S.schedules,activeId:S.activeId}});
  while(list.length>20)list.pop();
  try{localStorage.setItem(SNAPK,JSON.stringify(list));}catch(e){}
}
function restoreSnapshot(ts){
  const snap=loadSnapshots().find(s=>s.ts===ts);if(!snap)return;
  pushHistory();
  S.schedules=snap.data.schedules;S.activeId=snap.data.activeId||S.schedules[0]?.id;
  S.modal=null;save();render();
}
function deleteSnapshot(ts){
  const list=loadSnapshots().filter(s=>s.ts!==ts);
  try{localStorage.setItem(SNAPK,JSON.stringify(list));}catch(e){}
  render();
}

// Markdown export of the active schedule.
function toMarkdown(){
  let md=`# ${getAct()?.name||'Course Plan'}\n\n`;
  const all=getAS().flatMap(s=>s.courses);
  const tot=all.reduce((t,c)=>t+c.credits,0);
  const done=all.filter(c=>c.done).reduce((t,c)=>t+c.credits,0);
  md+=`**${done} / ${tot} credits completed.** ${all.filter(c=>c.done).length} of ${all.length} courses done.\n\n`;
  const sems=getAS();
  const writeSem=sem=>{
    md+=`## ${sem.label}\n\n`;
    if(sem.isOff){md+=`_${sem.offNote||'No classes this term.'}_\n\n`;return;}
    if(!sem.courses.length){md+=`_No courses._\n\n`;return;}
    for(const c of sem.courses)md+=`- ${c.done?'[x]':'[ ]'} **${c.code}** ${c.name} — ${c.credits}cr${c.grade?` (${c.grade})`:''}${c.note?`  \n  _${c.note}_`:''}\n`;
    md+=`\n`;
  };
  for(const row of LAYOUT)for(const id of row.ids){const s=sems.find(x=>x.id===id);if(s)writeSem(s);}
  for(const s of sems.filter(x=>!KNOWN.has(x.id)))writeSem(s);
  return md;
}

// ─── Undo/redo ────────────────────────────────────────────────────────────────
function snapState(){return JSON.stringify({schedules:S.schedules,activeId:S.activeId});}
function pushHistory(){
  const cur=snapState();
  if(HISTORY.past[HISTORY.past.length-1]===cur)return;
  HISTORY.past.push(cur);
  if(HISTORY.past.length>HISTORY.MAX)HISTORY.past.shift();
  HISTORY.future=[];
}
function undo(){
  if(!HISTORY.past.length)return;
  HISTORY.future.push(snapState());
  const p=JSON.parse(HISTORY.past.pop());
  S.schedules=p.schedules;S.activeId=p.activeId;
  save();render();
}
function redo(){
  if(!HISTORY.future.length)return;
  HISTORY.past.push(snapState());
  const p=JSON.parse(HISTORY.future.pop());
  S.schedules=p.schedules;S.activeId=p.activeId;
  save();render();
}

// ─── GPA ──────────────────────────────────────────────────────────────────────
// Defensive: trim/uppercase grade, coerce credits to a number so string credits
// from legacy data or imports don't double up via string multiplication.
function gpaFor(courses){
  let pts=0,hrs=0;
  for(const c of courses){
    if(!c.done)continue;
    const g=String(c.grade??'').trim().toUpperCase();
    if(!g||!(g in GRADE_PTS))continue;
    const p=GRADE_PTS[g];
    if(p==null)continue;
    const cr=Number(c.credits)||0;
    if(!cr)continue;
    pts+=p*cr;hrs+=cr;
  }
  return{pts,hrs,gpa:hrs?pts/hrs:null};
}
// Major GPA is strict: ECE = only ECE-prefix courses; Business = only Business.
// Math/Physics/AdvancedTech roll up into Overall but not into either major GPA.
function gpaPanel(){
  const all=getAS().flatMap(s=>s.courses);
  return{
    overall:gpaFor(all),
    eceMajor:gpaFor(all.filter(c=>c.cat==='ECE')),
    biz:gpaFor(all.filter(c=>c.cat==='BUSINESS')),
    all,
  };
}
// Per-semester GPA, computed over each semester's done+graded courses.
function gpaPerSem(){
  return getAS().filter(s=>!s.isOff).map(s=>({sem:s,g:gpaFor(s.courses)}));
}
function gradedRows(){
  const out=[];
  for(const sem of getAS()){
    if(sem.isOff||!sem.courses.length)continue;
    out.push({hdr:sem.label});
    for(const c of sem.courses)out.push({sem,c});
  }
  return out;
}

// ─── Track progress ──────────────────────────────────────────────────────────
function trackProgress(){
  const tk=getAct()?.track;if(!tk||!TRACKS[tk])return null;
  const t=TRACKS[tk];
  const codes=new Set(getAS().flatMap(s=>s.courses).map(c=>c.code.trim().toUpperCase().replace(/H$/,'')));
  const isECB=(getAct()?.kind||'ecb')!=='general';
  const need=isECB?t.pickECB:t.pickAll;
  const coreHit=t.cores.filter(c=>codes.has(c.code.toUpperCase().replace(/H$/,''))).length;
  const electHit=t.electives.filter(e=>codes.has(e.toUpperCase().replace(/H$/,''))).length;
  return{track:t,key:tk,need,coreHit,coreTotal:t.cores.length,electHit};
}

// ─── Confetti ─────────────────────────────────────────────────────────────────
function fireConfetti(){
  const canvas=document.getElementById('confetti');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const N=160,parts=[];
  for(let i=0;i<N;i++)parts.push({
    x:Math.random()*canvas.width,y:-20-Math.random()*200,
    vx:(Math.random()-.5)*4,vy:2+Math.random()*4,
    s:4+Math.random()*5,r:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.3,
    c:['#BF3A1F','#FFC862','#2A7A47','#185FA5','#7B3FA0','#C04870'][i%6],
  });
  let frames=0;
  (function step(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.r+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.6);ctx.restore();}
    frames++;
    if(frames<260)requestAnimationFrame(step);else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

function rCmpSem(semId,sA,sB,schA,schB){
  const codesA=new Set((sA?.courses||[]).map(c=>c.code.trim().toUpperCase()));
  const codesB=new Set((sB?.courses||[]).map(c=>c.code.trim().toUpperCase()));
  const shared=[...codesA].filter(c=>codesB.has(c)).length;
  const onlyA=codesA.size-shared,onlyB=codesB.size-shared;
  const label=sA?.label||sB?.label||semId;
  const crA=(sA?.courses||[]).reduce((t,c)=>t+c.credits,0);
  const crB=(sB?.courses||[]).reduce((t,c)=>t+c.credits,0);
  const rCC=(c,side)=>{
    const cat=CATS[c.cat]||CATS.OTHER;
    const isShared=(side==='a'?codesB:codesA).has(c.code.trim().toUpperCase());
    return `<div class="ccc${isShared?'':' o'+side}">
      ${!isShared?`<span class="ccc-lbl ${side}">${side.toUpperCase()}</span>`:''}
      <div style="width:6px;height:6px;border-radius:50%;background:${cat.txt};flex-shrink:0;margin-top:3px"></div>
      <div class="ccc-info"><span class="ccc-code" style="color:${cat.txt}">${esc(c.code)}</span><span class="ccc-name">${esc(c.name)}</span></div>
      <span class="ccc-cr">${c.credits}cr</span>
    </div>`;
  };
  return `<div class="csc">
    <div class="csc-hdr">
      <span class="csc-title">${esc(label)}</span>
      <span class="csc-cr">${crA}cr vs ${crB}cr</span>
      <div class="csc-pills">
        ${shared?`<span class="dpill sh">${shared} shared</span>`:''}
        ${onlyA?`<span class="dpill oa">${onlyA} only in A</span>`:''}
        ${onlyB?`<span class="dpill ob">${onlyB} only in B</span>`:''}
        ${!shared&&!onlyA&&!onlyB?'<span class="csc-cr">both empty</span>':''}
      </div>
    </div>
    <div class="csc-cols">
      <div class="csc-col">
        <div class="csc-col-hdr" style="background:${schA.color}20;color:${schA.color}"><span style="width:7px;height:7px;border-radius:50%;background:${schA.color};display:inline-block;flex-shrink:0"></span>${esc(schA.name)} · ${crA}cr</div>
        ${sA?.courses.length?sA.courses.map(c=>rCC(c,'a')).join(''):'<div class="csc-mt">No courses</div>'}
      </div>
      <div class="csc-div"></div>
      <div class="csc-col">
        <div class="csc-col-hdr" style="background:${schB.color}20;color:${schB.color}"><span style="width:7px;height:7px;border-radius:50%;background:${schB.color};display:inline-block;flex-shrink:0"></span>${esc(schB.name)} · ${crB}cr</div>
        ${sB?.courses.length?sB.courses.map(c=>rCC(c,'b')).join(''):'<div class="csc-mt">No courses</div>'}
      </div>
    </div>
  </div>`;
}

function rCompareView(){
  const schA=getAct(),schB=S.schedules.find(s=>s.id===S.compareId);
  if(!schA||!schB)return'';
  const semsA=schA.sems,semsB=schB.sems;
  const allIds=[...new Set([...semsA.map(s=>s.id),...semsB.map(s=>s.id)])];
  const allA=semsA.flatMap(s=>s.courses),allB=semsB.flatMap(s=>s.courses);
  const cA=new Set(allA.map(c=>c.code.trim().toUpperCase()));
  const cB=new Set(allB.map(c=>c.code.trim().toUpperCase()));
  const shAll=[...cA].filter(c=>cB.has(c)).length;
  const crA=allA.reduce((t,c)=>t+c.credits,0),crB=allB.reduce((t,c)=>t+c.credits,0);
  let body='';
  for(const row of LAYOUT){
    const relevant=row.ids.filter(id=>allIds.includes(id));
    if(!relevant.length)continue;
    if(row.label)body+=`<div class="yr-lbl">${row.label}</div>`;
    for(const id of relevant)body+=rCmpSem(id,semsA.find(s=>s.id===id),semsB.find(s=>s.id===id),schA,schB);
  }
  const customIds=allIds.filter(id=>!KNOWN.has(id));
  if(customIds.length){
    body+=`<div class="yr-lbl">Custom Semesters</div>`;
    for(const id of customIds)body+=rCmpSem(id,semsA.find(s=>s.id===id),semsB.find(s=>s.id===id),schA,schB);
  }
  return `<div class="cmp-bar">
    <div class="cmp-tag" style="background:${schA.color}30;color:${schA.color}"><span style="width:8px;height:8px;border-radius:50%;background:${schA.color};display:inline-block;margin-right:5px;vertical-align:middle"></span>A: ${esc(schA.name)} — ${allA.length} courses, ${crA}cr</div>

    <span class="cmp-sum">${shAll} shared · ${cA.size-shAll} unique to A · ${cB.size-shAll} unique to B</span>
    <button class="cmp-exit" onclick="S.compareMode=false;S.compareId=null;render()">✕ Exit Compare</button>
  </div>
  <div class="main">${body}</div>`;
}

            :`<div class="si-name">${esc(sch.name)}</div>`}
          <div class="si-meta">${all.length} courses · ${cr}cr · ${done} done${sch.track?` · track: ${TRACKS[sch.track]?.short||sch.track}`:''}</div>
        </div>
        <div class="si-acts">
          ${isRen
            ?`<button class="sa" onclick="commitRename('${sch.id}')">Save</button>`
            :`<button class="sa" onclick="startRename('${sch.id}')">Rename</button>`}
          <button class="sa" onclick="dupSched('${sch.id}')">Duplicate</button>
          ${isAct?`<span class="sa act-badge">✓ Active</span>`:`<button class="sa" onclick="switchSched('${sch.id}')">Switch</button>`}
          ${S.schedules.length>1?`<button class="sa d" onclick="delSched('${sch.id}')">Delete</button>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div class="mbk" id="mbk">
      <div class="modal" style="max-width:640px">
        <div class="mhdr">
          <h3>Saved Schedules</h3>
          <div style="display:flex;gap:8px;align-items:center">
            <button onclick="newSched()" style="padding:4px 11px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px">+ New Schedule</button>
            <button class="mclose" data-a="close-modal">×</button>
          </div>
        </div>
        <div class="mbody"><div class="slist">${items}</div></div>
        <div class="mfooter">
          <span class="left">${S.schedules.length} schedule(s)</span>
          <button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Done</button>
        </div>
      </div>
    </div>`;
  }

  if(S.modal==='compare-pick'){
    const others=S.schedules.filter(s=>s.id!==S.activeId);
    if(!others.length)return`<div class="mbk" id="mbk">
      <div class="modal" style="max-width:380px">
        <div class="mhdr"><h3>Compare Schedules</h3><button class="mclose" data-a="close-modal">×</button></div>
        <div class="mbody">
          <p style="color:var(--text2);font-size:13px">You need at least two schedules to compare.</p>
          <button onclick="newSched()" style="margin-top:12px;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px">+ New Schedule</button>
        </div>
        <div class="mfooter"><button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Cancel</button></div>
      </div>
    </div>`;
    const active=getAct();
    const items=others.map(s=>{
      const all=s.sems.flatMap(x=>x.courses);
      const cr=all.reduce((t,c)=>t+c.credits,0);
      const sel=S.cmpPickId===s.id;
      return `<div class="cpi${sel?' sel':''}" onclick="S.cmpPickId='${s.id}';render()">
        <div class="cpi-dot" style="background:${s.color}"></div>
        <div class="cpi-name">${esc(s.name)}</div>
        <div class="cpi-meta">${all.length} courses · ${cr}cr</div>
        ${sel?'<div style="font-size:16px;margin-top:5px;color:var(--accent)">✓</div>':''}
      </div>`;
    }).join('');
    return `<div class="mbk" id="mbk">
      <div class="modal" style="max-width:520px">
        <div class="mhdr"><h3>⇄ Compare with…</h3><button class="mclose" data-a="close-modal">×</button></div>
        <div class="mbody">
          <p style="font-size:12px;color:var(--text2);margin-bottom:12px"><strong>${esc(active?.name)}</strong> is schedule <span style="color:var(--accent);font-weight:600">A</span>. Pick one to compare against:</p>
          <div class="cpg">${items}</div>
        </div>
        <div class="mfooter">
          <button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Cancel</button>
          <button onclick="startCmp()" style="padding:6px 16px;background:${S.cmpPickId?'var(--accent)':'var(--border2)'};color:${S.cmpPickId?'#fff':'var(--text3)'};border:none;border-radius:6px;cursor:pointer;font-size:12px">Compare →</button>
        </div>
      </div>
    </div>`;
  }

  if(S.modal==='gpa'){
    const p=gpaPanel();
    const fmt=g=>g.gpa==null?'—':g.gpa.toFixed(3);
    const target=parseFloat(S.gpaTarget);
    const remainCr=p.all.filter(c=>!c.done).reduce((t,c)=>t+c.credits,0);
    let targetRes='';
    if(!isNaN(target)&&target>=0&&target<=4){
      if(remainCr===0)targetRes='No remaining graded credits to project against.';
      else{
        const needed=(target*(p.overall.hrs+remainCr)-p.overall.pts)/remainCr;
        if(needed<=0)targetRes=`You are already at or above ${target.toFixed(2)}. Remaining courses can be any grade.`;
        else if(needed>4)targetRes=`Not reachable. Would need a ${needed.toFixed(2)} GPA across the remaining ${remainCr} credits.`;
        else targetRes=`Need a <b>${needed.toFixed(3)}</b> GPA across the remaining ${remainCr} credits to reach <b>${target.toFixed(2)}</b>.`;
      }
    }
    const rows=gradedRows().map(r=>{
      if(r.hdr)return`<div class="gpa-sec">${esc(r.hdr)}</div>`;
      const{sem,c}=r;
      const gOpts=GRADE_OPTS.map(g=>`<option value="${g}"${(c.grade||'')===g?' selected':''}>${g||'—'}</option>`).join('');
      return`<div class="gpa-row">
        <span class="gcode" style="color:${(CATS[c.cat]||CATS.OTHER).txt}">${esc(c.code)}</span>
        <span class="gname">${esc(c.name)}</span>
        <span class="gcr">${c.credits}cr</span>
        <select onchange="setGrade('${sem.id}','${c.id}',this.value)" ${c.done?'':'disabled title="Mark course done first"'}>${gOpts}</select>
      </div>`;
    }).join('');
    return`<div class="mbk" id="mbk">
      <div class="modal" style="max-width:720px">
        <div class="mhdr"><h3>📊 GPA Calculator</h3><button class="mclose" data-a="close-modal">×</button></div>
        <div class="mbody">
          <div class="gpa-stats">
            <div class="gpa-stat"><div class="v">${fmt(p.overall)}</div><div class="l">Overall GPA</div><div style="font-size:9px;color:var(--text3);margin-top:2px">${p.overall.hrs} credits graded</div></div>
            <div class="gpa-stat"><div class="v">${fmt(p.eceMajor)}</div><div class="l">ECE Major GPA</div><div style="font-size:9px;color:var(--text3);margin-top:2px">${p.eceMajor.hrs} cr · ECE courses only</div></div>
            <div class="gpa-stat"><div class="v">${fmt(p.biz)}</div><div class="l">Business GPA</div><div style="font-size:9px;color:var(--text3);margin-top:2px">${p.biz.hrs} cr · BHP courses only</div></div>
          </div>
          ${(()=>{const sg=gpaPerSem().filter(x=>x.g.hrs>0);return sg.length?`<div class="gpa-target" style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Per-semester GPA</div>${sg.map(x=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px dashed var(--border)"><span>${esc(x.sem.label)}</span><span><b>${fmt(x.g)}</b> <span style="color:var(--text3)">${x.g.hrs}cr</span></span></div>`).join('')}</div>`:'';})()}
          <div class="gpa-target">
            <label>Target overall GPA: <input type="number" min="0" max="4" step="0.01" value="${esc(S.gpaTarget)}" oninput="S.gpaTarget=this.value;updateTarget()"> <span style="font-size:10px;color:var(--text3)">UT scale: A=4.0, A-=3.67, B+=3.33…</span></label>
            <div class="res" id="gpa-target-res">${targetRes||'<span style=\"color:var(--text3)\">Enter a target to see what GPA your remaining courses need.</span>'}</div>
          </div>
          <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">${rows||'<div class="empty">No courses to grade yet.</div>'}</div>
        </div>
        <div class="mfooter">
          <span class="left">Grades count toward GPA only when the course is marked done. CR/NC/Q/W/IP are excluded.</span>
          <button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Close</button>
        </div>
      </div>
    </div>`;
  }

  if(S.modal==='search'){
    const q=(S.searchQ||'').trim().toLowerCase();
    let results=[];
    if(q)for(const sch of S.schedules)for(const sem of sch.sems)for(const c of sem.courses)if(c.code.toLowerCase().includes(q)||c.name.toLowerCase().includes(q))results.push({sch,sem,c});
    const body=q?(results.length?`<div class="sres">${results.slice(0,80).map(r=>`
      <div class="sres-row" onclick="jumpTo('${r.sch.id}','${r.sem.id}','${r.c.id}')">
        <span class="sr-code" style="color:${(CATS[r.c.cat]||CATS.OTHER).txt}">${esc(r.c.code)}</span>
        <span class="sr-name">${esc(r.c.name)}</span>
        <span class="sr-loc">${esc(r.sch.name)} · ${esc(r.sem.label)}</span>
      </div>`).join('')}</div>`:'<div class="sres-empty">No matches.</div>'):'<div class="sres-empty">Type a course code or name above.</div>';
    return`<div class="mbk" id="mbk">
      <div class="modal" style="max-width:600px">
        <div class="mhdr"><h3>🔎 Search across all schedules</h3><button class="mclose" data-a="close-modal">×</button></div>
        <div class="mbody">
          <input id="search-inp" autofocus placeholder="ECE 411, Operations Management…" value="${esc(S.searchQ)}" oninput="onSearchInput(this.value)" style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border2);border-radius:7px;background:var(--surface2);color:var(--text);outline:none">
          ${body}
        </div>
        <div class="mfooter"><button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Close</button></div>
      </div>
    </div>`;
  }

  if(S.modal==='history'){
    const snaps=loadSnapshots();
    const body=snaps.length?snaps.map(s=>{
      const tot=s.data.schedules.reduce((t,sch)=>t+sch.sems.flatMap(x=>x.courses).length,0);
      const d=new Date(s.ts);
      return`<div class="hist-row">
        <div>
          <div class="hr-when">${d.toLocaleString()}</div>
          <div class="hr-sum">${s.data.schedules.length} schedule(s), ${tot} courses · ${esc(s.reason||'auto')}</div>
        </div>
        <div style="display:flex;gap:5px">
          <button onclick="restoreSnapshot(${s.ts})">Restore</button>
          <button onclick="deleteSnapshot(${s.ts})" style="color:#C00;border-color:#FCC">Delete</button>
        </div>
      </div>`;
    }).join(''):'<div class="sres-empty">No snapshots yet. They get saved automatically as you make changes.</div>';
    return`<div class="mbk" id="mbk">
      <div class="modal" style="max-width:560px">
        <div class="mhdr">
          <h3>🕒 Version History</h3>
          <div style="display:flex;gap:8px;align-items:center">
            <button onclick="saveSnapshotNow('manual');render()" style="padding:4px 11px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px">Save Snapshot Now</button>
            <button class="mclose" data-a="close-modal">×</button>
          </div>
        </div>
        <div class="mbody">${body}</div>
        <div class="mfooter">
          <span class="left">Up to 20 snapshots kept. For finer rewind, press Ctrl+Z to undo.</span>
          <button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Close</button>
        </div>
      </div>
    </div>`;
  }

  if(S.modal==='track'){
    const cur=getAct();const sel=cur?.track||'';
    const prog=trackProgress();
    const kind=cur?.kind||'ecb';
    const cards=Object.entries(TRACKS).map(([k,t])=>`
      <div class="tk-card${sel===k?' sel':''}" onclick="setTrack('${k}')">
        <div class="tk-name">${esc(t.name)}</div>
        <div class="tk-grad">Grad track: ${esc(t.grad)} · ECB needs ${t.pickECB} electives, General/Honors ${t.pickAll}</div>
      </div>`).join('');
    const codes=new Set(getAS().flatMap(s=>s.courses).map(x=>x.code.trim().toUpperCase().replace(/H$/,'')));
    const progBox=prog?`
      <div class="tk-prog">
        <div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:12px">${esc(prog.track.short)}</b><span style="font-size:11px;color:var(--text2)">${prog.coreHit}/${prog.coreTotal} cores · ${prog.electHit}/${prog.need} electives</span></div>
        <div class="tp-bar"><div class="tp-fill" style="width:${Math.min(100,(prog.coreHit+Math.min(prog.electHit,prog.need))/(prog.coreTotal+prog.need)*100)}%"></div></div>
        <div class="tk-h">Required cores <span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0">— click to add to your plan</span></div>
        <div class="tk-list">${prog.track.cores.map(c=>{
          const hit=codes.has(c.code.toUpperCase().replace(/H$/,''));
          const click=hit?'':`style="cursor:pointer" title="Click to add to your plan" onclick="addTrackCourse('${esc(c.code)}','${esc(c.name)}')"`;
          return`<div class="${hit?'ok':'miss'}" ${click}>${hit?'✓':'＋'} ${esc(c.code)} — ${esc(c.name)}${c.alt?` <span style=\"color:var(--text3)\">(${esc(c.alt)})</span>`:''}</div>`;
        }).join('')}</div>
        <div class="tk-h">Approved electives (pick ${prog.need}) <span style="font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0">— click to add</span></div>
        <div class="tk-list" style="columns:2;column-gap:18px">${prog.track.electives.map(e=>{
          const hit=codes.has(e.toUpperCase().replace(/H$/,''));
          const click=hit?'':`style="cursor:pointer" title="Click to add" onclick="addTrackCourse('${esc(e)}','${esc(e)} (track elective)')"`;
          return`<div class="${hit?'ok':'miss'}" ${click}>${hit?'✓':'＋'} ${esc(e)}</div>`;
        }).join('')}</div>
      </div>`:'';
    return`<div class="mbk" id="mbk">
      <div class="modal" style="max-width:720px">
        <div class="mhdr"><h3>🎯 ECE Technical Component Track</h3><button class="mclose" data-a="close-modal">×</button></div>
        <div class="mbody">
          <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;font-size:12px;color:var(--text2);flex-wrap:wrap">
            <span>Student type:</span>
            <label><input type="radio" name="kind" value="ecb" ${kind==='ecb'?'checked':''} onchange="setKind('ecb')"> ECB Dual Degree</label>
            <label><input type="radio" name="kind" value="general" ${kind==='general'?'checked':''} onchange="setKind('general')"> General / Honors</label>
          </div>
          ${progBox}
          <div class="tk-h">Pick a track</div>
          <div class="tk-grid">${cards}</div>
          ${sel?`<button onclick="setTrack('')" style="margin-top:8px;padding:5px 11px;font-size:11px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text2);cursor:pointer">Clear track</button>`:''}
        </div>
        <div class="mfooter">
          <span class="left">Data from Chandra Dept Tech Core Packet (Dec 2025). Always confirm with your faculty advisor.</span>
          <button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Close</button>
        </div>
      </div>
    </div>`;
  }

  if(S.modal==='kbhelp'){
    const rows=[
      ['N','Add course to first available semester'],
      ['C','Compare schedules'],
      ['S','Search across schedules'],
      ['G','Open GPA calculator'],
      ['T','ECE track picker'],
      ['H','Version history'],
      ['L','Saved schedules list'],
      ['P','Print or save as PDF'],
      ['Ctrl + Z','Undo'],
      ['Ctrl + Shift + Z','Redo'],
      ['Shift + click','Add course to multi-select'],
      ['1 to 4','Jump to year section'],
      ['Esc','Close modal or clear selection'],
      ['?','Show this help'],
    ];
    return`<div class="mbk" id="mbk">
      <div class="modal" style="max-width:480px">
        <div class="mhdr"><h3>⌨️ Keyboard Shortcuts</h3><button class="mclose" data-a="close-modal">×</button></div>
        <div class="mbody">${rows.map(r=>`<div class="kb-row"><span>${r[1]}</span><span class="kb-key">${r[0]}</span></div>`).join('')}</div>
        <div class="mfooter"><button data-a="close-modal" style="padding:6px 14px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text)">Close</button></div>
      </div>
    </div>`;
  }
  return'';
}

// ─── Main render ──────────────────────────────────────────────────────────────
function render(){
  // Capture modal scroll position so things like the GPA grade picker don't
  // jump the user back to the top every time they pick a grade.
  const prevModalScroll=document.querySelector('.mbody')?.scrollTop||0;
  const act=getAct();
  const sems=getAS();
  const all=sems.flatMap(s=>s.courses);
  const total=all.length,done=all.filter(c=>c.done).length;
  const totalCr=all.reduce((t,c)=>t+Number(c.credits||0),0),doneCr=all.filter(c=>c.done).reduce((t,c)=>t+Number(c.credits||0),0);
  const pct=total?Math.round(done/total*100):0;

  if(pct===100&&S.lastPct<100)setTimeout(fireConfetti,50);
  S.lastPct=pct;

  const fbtns=`<button class="fbtn${!S.filter?' on':''}" data-a="filter" data-cat="">All</button>`+
    Object.entries(CATS).map(([k,v])=>{
      const on=S.filter===k;
      return `<button class="fbtn${on?' on':''}" data-a="filter" data-cat="${k}" style="${on?`background:${v.txt};color:${v.bg};border-color:${v.txt}`:`border-color:${v.txt};color:${v.txt}`}">${v.name}</button>`;
    }).join('');

  const prog=trackProgress();
  const trackPill=act?`<div class="track-pill" onclick="S.modal='track';render()" title="ECE Technical Component">
      🎯 ${prog?`${esc(prog.track.short)} <span style="opacity:.7">${prog.coreHit}/${prog.coreTotal}c · ${prog.electHit}/${prog.need}e</span>`:'Pick a track'}
    </div>`:'';

  document.getElementById('root').innerHTML=`
    ${rModal()}
    ${S.tabConflict?`<div class="tab-warn">⚠ Another tab has this planner open. Whichever tab saves last wins. <button onclick="S.tabConflict=false;render()">Got it</button></div>`:''}
    <div class="hdr">
      <div class="hdr-top">
        <div>
          <div class="hdr-sub">UT Austin · ECE + Business Honors</div>
          <h1>Course Planner <span style="font-size:11px;opacity:.5;font-weight:400">2024–2026</span></h1>
          <div style="margin-top:4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            <div class="sched-pill" onclick="S.modal='schedules';render()">
              <div class="sched-dot" style="background:${act?.color||'#FFF'}"></div>
              <span style="font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(act?.name||'')}</span>
              <span style="opacity:.7;font-size:10px">▾</span>
            </div>
            ${trackPill}
            ${S.schedules.length>1?`<span style="font-size:10px;opacity:.6">${S.schedules.length} schedules</span>`:''}
          </div>
        </div>
        <div class="hdr-right">
          <div class="stats">
            <div class="stat"><div class="v">${done}/${total}</div><div class="l">Done</div></div>
            <div class="stat"><div class="v">${doneCr}/${totalCr}</div><div class="l">Credits</div></div>
            <div class="stat"><div class="v">${pct}%</div><div class="l">Progress</div></div>
          </div>
          <div class="hdr-btns">
            <button class="hbtn" onclick="S.modal='schedules';render()" title="Saved schedules (L)">📋 Schedules</button>
            <button class="hbtn" onclick="S.cmpPickId=null;S.modal='compare-pick';render()" title="Compare (C)">⇄ Compare</button>
            <button class="hbtn" onclick="S.modal='gpa';render()" title="GPA calculator (G)">📊 GPA</button>
            <button class="hbtn" onclick="S.modal='track';render()" title="Track (T)">🎯 Track</button>
            <button class="hbtn" onclick="S.modal='search';render()" title="Search (S)">🔎 Search</button>
            <button class="hbtn" onclick="S.modal='history';render()" title="Version history (H)">🕒 History</button>
            <button class="hbtn" onclick="window.print()" title="Print or save as PDF (P)">🖨️ Print</button>
            <button class="hbtn" onclick="S.modalTab='code';S.modal='export';render()" title="Share">📤 Share</button>
            <button class="hbtn" onclick="S.modal='import';render()" title="Import">📥 Import</button>
            <button class="hbtn ghost" onclick="undo()" title="Undo (Ctrl+Z)" ${HISTORY.past.length?'':'disabled'}>↶</button>
            <button class="hbtn ghost" onclick="redo()" title="Redo (Ctrl+Shift+Z)" ${HISTORY.future.length?'':'disabled'}>↷</button>
            <button class="hbtn ghost" onclick="S.modal='kbhelp';render()" title="Keyboard shortcuts">?</button>
            <button class="hbtn ghost" onclick="S.modal='reset';render()" title="Reset">↺</button>
          </div>
        </div>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    ${rSelToolbar()}
    <nav class="nav">
      <span class="nav-lbl">Filter:</span>${fbtns}
      <div class="nav-right">${S.compareMode?'':`<button class="nsm p" data-a="show-add-sem">+ Add Semester</button>`}</div>
    </nav>
    ${S.compareMode?rCompareView():`${rEP()}${rMain()}`}`;

  if(S.renamingId&&S.modal==='schedules')setTimeout(()=>{const el=document.getElementById('ren-inp');if(el){el.focus();el.select();}},50);
  if(S.modal==='search')setTimeout(()=>{const i=document.getElementById('search-inp');if(i&&document.activeElement!==i)i.focus();},0);
  // Restore modal scroll so picking a grade in a long GPA list doesn't jump
  // the user back to the top of the modal.
  if(S.modal&&prevModalScroll){const mb=document.querySelector('.mbody');if(mb)mb.scrollTop=prevModalScroll;}
}

// ─── Event delegation ─────────────────────────────────────────────────────────
function mutate(fn,opts){
  pushHistory();
  fn();
  const last=loadSnapshots()[0];
  if(!last||Date.now()-last.ts>60000)saveSnapshotNow(opts?.reason||'auto');
  save();render();
}

document.addEventListener('click',e=>{
  if(e.target.id==='mbk'){S.modal=null;S.modalTab=null;S.renamingId=null;render();return;}
  const el=e.target.closest('[data-a]');if(!el)return;
  const a=el.dataset.a,sem=el.dataset.sem,cid=el.dataset.cid;
  if(a==='filter')mutate(()=>S.filter=el.dataset.cat||null);
  else if(a==='toggle'){e.stopPropagation();mutate(()=>setAS(getAS().map(s=>s.id!==sem?s:{...s,courses:s.courses.map(c=>c.id!==cid?c:{...c,done:!c.done})})));}
  else if(a==='edit'){
    e.stopPropagation();
    const sems=getAS();const s=sems.find(x=>x.id===sem);const c=s?.courses.find(x=>x.id===cid);
    if(c){S.edit={semId:sem,courseId:cid,isNew:false};S.form={...c,semId:sem};render();window.scrollTo(0,0);}
  }
  else if(a==='add'){S.edit={semId:sem,isNew:true};S.form={id:uid(),code:'',name:'',cat:'ECE',credits:3,done:false,note:'',grade:'',semId:sem};render();window.scrollTo(0,0);}
  else if(a==='cancel'){S.edit=null;S.form={};render();}
  else if(a==='save'){
    const code=document.getElementById('f-code').value.trim();
    const name=document.getElementById('f-name').value.trim();
    if(!code||!name)return;
    const credits=Math.max(0,parseInt(document.getElementById('f-credits').value)||0);
    const cat=document.getElementById('f-cat').value;
    const toSem=document.getElementById('f-sem').value;
    const note=document.getElementById('f-note').value.trim();
    const grade=document.getElementById('f-grade').value;
    const updated={id:S.form.id,code,name,credits,cat,done:S.form.done||false,note,grade};
    mutate(()=>{
      let sems=getAS();const from=S.edit.semId;
      if(S.edit.isNew){sems=sems.map(s=>s.id!==toSem?s:{...s,courses:[...s.courses,updated]});}
      else if(from===toSem){sems=sems.map(s=>s.id!==from?s:{...s,courses:s.courses.map(c=>c.id!==updated.id?c:updated)});}
      else{sems=sems.map(s=>{if(s.id===from)return{...s,courses:s.courses.filter(c=>c.id!==updated.id)};if(s.id===toSem)return{...s,courses:[...s.courses,updated]};return s;});}
      setAS(sems);S.edit=null;S.form={};
    });
  }
  else if(a==='del'){const{semId,courseId}=S.edit;mutate(()=>{setAS(getAS().map(s=>s.id!==semId?s:{...s,courses:s.courses.filter(c=>c.id!==courseId)}));S.edit=null;S.form={};});}
  else if(a==='dsem'){mutate(()=>{setAS(getAS().filter(s=>s.id!==sem));if(S.edit?.semId===sem){S.edit=null;S.form={};}});}
  else if(a==='show-add-sem'){S.showAddSem=true;render();}
  else if(a==='addsem'){
    const n=document.getElementById('nsn')?.value.trim();
    if(!n){S.showAddSem=false;render();return;}
    const tpl=SEM_TEMPLATES[S.addSemKind]||SEM_TEMPLATES.normal;
    const newSem={id:'sem_'+Date.now(),label:n,courses:tpl.courses.map(c=>({...c,id:uid(),done:false})),isOff:!!tpl.isOff,offNote:tpl.offNote||''};
    mutate(()=>{setAS([...getAS(),newSem]);S.showAddSem=false;S.addSemKind='normal';});
  }
  else if(a==='cancelsem'){S.showAddSem=false;render();}
  else if(a==='close-modal'){S.modal=null;S.modalTab=null;S.renamingId=null;render();}
});

// ─── Course click (selection) ────────────────────────────────────────────────
window.cClick=(semId,cid,e)=>{
  if(e.target.closest('[data-a]')||e.target.closest('.ebtn'))return;
  if(e.shiftKey){
    e.preventDefault();
    if(S.selectionSem&&S.selectionSem!==semId)S.selection.clear();
    S.selectionSem=semId;
    if(S.selection.has(cid))S.selection.delete(cid);else S.selection.add(cid);
    render();
  }else if(S.selection.size){
    clearSel();
  }
};
window.clearSel=()=>{S.selection.clear();S.selectionSem=null;render();};
window.bulkToggle=v=>{const ids=[...S.selection];const sem=S.selectionSem;mutate(()=>{setAS(getAS().map(s=>s.id!==sem?s:{...s,courses:s.courses.map(c=>ids.includes(c.id)?{...c,done:v}:c)}));clearSel();});};
window.bulkDelete=()=>{const ids=[...S.selection];const sem=S.selectionSem;mutate(()=>{setAS(getAS().map(s=>s.id!==sem?s:{...s,courses:s.courses.filter(c=>!ids.includes(c.id))}));clearSel();});};
window.bulkMove=()=>{
  const dest=document.getElementById('bulkdest')?.value;if(!dest)return;
  const ids=[...S.selection];const from=S.selectionSem;
  mutate(()=>{
    let moving=[];
    let sems=getAS().map(s=>{if(s.id===from){moving=s.courses.filter(c=>ids.includes(c.id));return{...s,courses:s.courses.filter(c=>!ids.includes(c.id))};}return s;});
    sems=sems.map(s=>s.id!==dest?s:{...s,courses:[...s.courses,...moving]});
    setAS(sems);clearSel();
  });
};

// ─── Schedule actions ─────────────────────────────────────────────────────────
window.switchSched=id=>mutate(()=>{S.activeId=id;S.compareMode=false;S.edit=null;S.form={};S.modal=null;});
window.newSched=()=>mutate(()=>{
  const id=sid();
  S.schedules.push({id,name:nextName(),color:nextColor(),sems:dc(DS),createdAt:Date.now(),updatedAt:Date.now(),kind:'ecb'});
  S.activeId=id;S.modal=null;S.edit=null;S.form={};
});
window.dupSched=srcId=>mutate(()=>{
  const src=S.schedules.find(s=>s.id===srcId);if(!src)return;
  const id=sid();
  S.schedules.push({id,name:src.name+' (copy)',color:nextColor(),sems:dc(src.sems),createdAt:Date.now(),updatedAt:Date.now(),track:src.track,kind:src.kind||'ecb'});
  S.activeId=id;S.modal=null;
});
window.delSched=id=>{if(S.schedules.length<=1)return;mutate(()=>{S.schedules=S.schedules.filter(s=>s.id!==id);if(S.activeId===id)S.activeId=S.schedules[0].id;if(S.compareId===id){S.compareId=null;S.compareMode=false;}});};
window.startRename=id=>{S.renamingId=id;render();};
window.commitRename=id=>{const val=document.getElementById('ren-inp')?.value.trim();if(val)mutate(()=>{S.schedules=S.schedules.map(s=>s.id!==id?s:{...s,name:val});S.renamingId=null;});else{S.renamingId=null;render();}};
window.startCmp=()=>{if(!S.cmpPickId)return;S.compareId=S.cmpPickId;S.compareMode=true;S.modal=null;S.edit=null;render();};

// ─── GPA / track ──────────────────────────────────────────────────────────────
window.setGrade=(semId,cid,g)=>mutate(()=>{
  setAS(getAS().map(s=>s.id!==semId?s:{...s,courses:s.courses.map(c=>c.id!==cid?c:{...c,grade:g})}));
});
window.updateTarget=()=>{
  const el=document.getElementById('gpa-target-res');if(!el)return;
  const p=gpaPanel();const target=parseFloat(S.gpaTarget);
  const remainCr=p.all.filter(c=>!c.done).reduce((t,c)=>t+c.credits,0);
  if(isNaN(target)){el.innerHTML='<span style="color:var(--text3)">Enter a target to see what GPA your remaining courses need.</span>';return;}
  if(remainCr===0){el.textContent='No remaining graded credits to project against.';return;}
  const needed=(target*(p.overall.hrs+remainCr)-p.overall.pts)/remainCr;
  if(needed<=0)el.textContent=`You are already at or above ${target.toFixed(2)}. Remaining courses can be any grade.`;
  else if(needed>4)el.textContent=`Not reachable. Would need a ${needed.toFixed(2)} GPA across the remaining ${remainCr} credits.`;
  else el.innerHTML=`Need a <b>${needed.toFixed(3)}</b> GPA across the remaining ${remainCr} credits to reach <b>${target.toFixed(2)}</b>.`;
};
window.setTrack=key=>mutate(()=>{
  S.schedules=S.schedules.map(s=>s.id!==S.activeId?s:{...s,track:key||null});
});
window.setKind=k=>mutate(()=>{
  S.schedules=S.schedules.map(s=>s.id!==S.activeId?s:{...s,kind:k});
});

// ─── Search ───────────────────────────────────────────────────────────────────
window.onSearchInput=v=>{S.searchQ=v;render();};
window.jumpTo=(schId,semId,cid)=>{
  S.modal=null;S.activeId=schId;S.compareMode=false;
  const sems=getAS();const s=sems.find(x=>x.id===semId);const c=s?.courses.find(x=>x.id===cid);
  if(c){S.edit={semId,courseId:cid,isNew:false};S.form={...c,semId};}
  render();window.scrollTo(0,0);
};

// ─── Share / import / reset ──────────────────────────────────────────────────
window.copyCode=()=>copyText('share-code','copy-badge');
window.copyText=(taId,badgeId)=>{
  const ta=document.getElementById(taId);if(!ta)return;ta.select();
  try{navigator.clipboard.writeText(ta.value).then(()=>{const b=document.getElementById(badgeId);if(b){b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2500);}});}catch(e){try{document.execCommand('copy');}catch(e2){}}
};
window.doImport=()=>{
  const raw=document.getElementById('import-code')?.value;if(!raw)return;
  try{const p=decodeShare(raw);mutate(()=>{S.schedules=p.schedules;S.activeId=p.activeId||p.schedules[0].id;S.compareMode=false;S.compareId=null;S.modal=null;S.edit=null;S.form={};},{reason:'import'});}
  catch(ex){const err=document.getElementById('import-err');if(err)err.style.display='block';}
};
window.doReset=()=>{saveSnapshotNow('pre-reset');mutate(()=>{initDefault();S.compareMode=false;S.compareId=null;S.modal=null;S.edit=null;S.form={};},{reason:'reset'});};

// ─── Drag & Drop ──────────────────────────────────────────────────────────────
window.wDS=(semId,courseId)=>{
  if(S.selection.has(courseId)&&S.selectionSem===semId){
    S.dragSrc={semId,courseId,bulk:true,ids:[...S.selection]};
  }else{
    S.dragSrc={semId,courseId,bulk:false};
  }
};
window.wDE=()=>{S.dragOver=null;document.querySelectorAll('.sc.dov').forEach(e=>e.classList.remove('dov'));};
window.wDO=semId=>{if(S.dragOver!==semId){S.dragOver=semId;document.querySelectorAll('.sc.dov').forEach(e=>e.classList.remove('dov'));document.getElementById('sc-'+semId)?.classList.add('dov');}};
window.wDL=semId=>{document.getElementById('sc-'+semId)?.classList.remove('dov');if(S.dragOver===semId)S.dragOver=null;};
window.wDrop=targetSemId=>{
  document.querySelectorAll('.sc.dov').forEach(e=>e.classList.remove('dov'));S.dragOver=null;
  if(!S.dragSrc||S.dragSrc.semId===targetSemId){S.dragSrc=null;return;}
  const{semId:from,courseId,bulk,ids}=S.dragSrc;
  mutate(()=>{
    if(bulk){
      let moving=[];
      let sems=getAS().map(s=>{if(s.id===from){moving=s.courses.filter(c=>ids.includes(c.id));return{...s,courses:s.courses.filter(c=>!ids.includes(c.id))};}return s;});
      sems=sems.map(s=>s.id!==targetSemId?s:{...s,courses:[...s.courses,...moving]});
      setAS(sems);clearSel();
    }else{
      let moved;
      let sems=getAS().map(s=>{if(s.id===from){moved=s.courses.find(c=>c.id===courseId);return{...s,courses:s.courses.filter(c=>c.id!==courseId)};}return s;});
      if(moved)sems=sems.map(s=>s.id!==targetSemId?s:{...s,courses:[...s.courses,moved]});
      setAS(sems);
    }
    S.dragSrc=null;
  });
};

// ─── Auto-scroll while dragging ───────────────────────────────────────────────
// When a drag gets close to the top or bottom of the viewport, scroll the page
// so the user can drag courses across long plans without releasing the mouse.
let dragScrollDir=0,dragScrollRAF=null;
function dragScrollTick(){
  if(!dragScrollDir){dragScrollRAF=null;return;}
  window.scrollBy(0,dragScrollDir*14);
  dragScrollRAF=requestAnimationFrame(dragScrollTick);
}
document.addEventListener('dragover',e=>{
  if(!S.dragSrc)return;
  const y=e.clientY,vh=window.innerHeight,ZONE=90;
  if(y<ZONE)dragScrollDir=-1;
  else if(y>vh-ZONE)dragScrollDir=1;
  else dragScrollDir=0;
  if(dragScrollDir&&!dragScrollRAF)dragScrollRAF=requestAnimationFrame(dragScrollTick);
});
['dragend','drop','mouseup'].forEach(ev=>document.addEventListener(ev,()=>{dragScrollDir=0;}));

// ─── Add a course from the track picker into the schedule ────────────────────
// Parse credits from the course code first digit per UT convention.
function parseCreditsFromCode(code){
  const m=String(code||'').match(/[^\d]*(\d)/);
  return m?parseInt(m[1],10):3;
}
function categoryForCode(code){
  const c=String(code||'').trim().toUpperCase();
  if(c.startsWith('M '))return'MATH';
  if(c.startsWith('PHY'))return'PHY';
  if(c.startsWith('ECE'))return'ECE';
  return'ADVANCED';
}
window.addTrackCourse=(code,name)=>{
  const sems=getAS();
  // First try to replace an unfilled ATC-* or ATE placeholder so the slot
  // counters in the default ECB plan stay accurate.
  let targetSemId=null,replaceCid=null;
  outer:for(const s of sems){
    if(s.isOff)continue;
    for(const c of s.courses){
      const cd=String(c.code).trim().toUpperCase();
      if(cd.startsWith('ATC-')||cd==='ATE'){targetSemId=s.id;replaceCid=c.id;break outer;}
    }
  }
  const cat=categoryForCode(code);
  const credits=parseCreditsFromCode(code);
  mutate(()=>{
    if(targetSemId&&replaceCid){
      setAS(getAS().map(s=>s.id!==targetSemId?s:{...s,courses:s.courses.map(c=>c.id!==replaceCid?c:{...c,code,name,cat,credits,note:'Added from track picker'})}));
    }else{
      // No placeholder left, just append to Year 3 Fall (or the first non-off semester).
      const sem=getAS().find(s=>s.id==='y3f'&&!s.isOff)||getAS().find(s=>!s.isOff);
      if(!sem)return;
      setAS(getAS().map(s=>s.id!==sem.id?s:{...s,courses:[...s.courses,{id:uid(),code,name,cat,credits,done:false,note:'Added from track picker',grade:''}]}));
    }
  });
};

// ─── Undo/redo, snapshots exposed ────────────────────────────────────────────
window.undo=undo;window.redo=redo;
window.restoreSnapshot=restoreSnapshot;window.deleteSnapshot=deleteSnapshot;
window.saveSnapshotNow=saveSnapshotNow;

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const t=e.target;const tag=t?.tagName;
  const inField=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||t?.isContentEditable;
  if(e.key==='Escape'){
    if(S.modal){S.modal=null;S.modalTab=null;S.renamingId=null;render();}
    else if(S.selection.size)clearSel();
    else if(S.edit){S.edit=null;S.form={};render();}
    return;
  }
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key.toLowerCase()==='z'){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key.toLowerCase()==='y'||(e.shiftKey&&e.key.toLowerCase()==='z'))){e.preventDefault();redo();return;}
  if(inField)return;
  const k=e.key.toLowerCase();
  if(k==='n'){const sems=getAS().filter(s=>!s.isOff);const target=sems[0];if(target){S.edit={semId:target.id,isNew:true};S.form={id:uid(),code:'',name:'',cat:'ECE',credits:3,done:false,note:'',grade:'',semId:target.id};render();window.scrollTo(0,0);}e.preventDefault();}
  else if(k==='c'){S.cmpPickId=null;S.modal='compare-pick';render();e.preventDefault();}
  else if(k==='s'){S.modal='search';render();e.preventDefault();}
  else if(k==='g'){S.modal='gpa';render();e.preventDefault();}
  else if(k==='t'){S.modal='track';render();e.preventDefault();}
  else if(k==='h'){S.modal='history';render();e.preventDefault();}
  else if(k==='l'){S.modal='schedules';render();e.preventDefault();}
  else if(k==='p'){window.print();e.preventDefault();}
  else if(e.key==='?'){S.modal='kbhelp';render();e.preventDefault();}
  else if(k>='1'&&k<='4'){
    const yrIdx=parseInt(k);const rowIds=LAYOUT.find(r=>r.label===`Year ${yrIdx}`)?.ids;
    if(rowIds){const el=document.getElementById('sc-'+rowIds[0]);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
    e.preventDefault();
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
(async()=>{
  const ok=await load();
  if(!ok)initDefault();
  S.schedules=S.schedules.map(s=>({kind:'ecb',...s}));
  render();
})();
</script>
